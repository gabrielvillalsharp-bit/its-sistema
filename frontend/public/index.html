<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ITS — Sistema Académico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--blue:#185FA5;--bl:#E6F1FB;--bld:#0C447C;--green:#27500A;--gl:#EAF3DE;--red:#791F1F;--rl:#FCEBEB;--amb:#633806;--al:#FAEEDA;--pur:#3C3489;--pl:#EEEDFE;--bdr:#e5e4df;--bg:#f8f7f4;--txt:#1a1a18;--t2:#5f5e5a;--t3:#888780}
body{background:var(--bg);color:var(--txt);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:14px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lc{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:2rem;width:380px}
.ll{text-align:center;margin-bottom:1.5rem}
.lb{width:52px;height:52px;background:var(--blue);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px}
.lb svg{width:26px;height:26px;fill:white}
.lc h1{font-size:18px;font-weight:600;margin-bottom:2px}
.lc p{font-size:13px;color:var(--t2)}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px;font-weight:500}
.bp{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.bp:hover{background:var(--bld)}
.dl{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.dl p{font-size:11px;color:var(--t3);margin-bottom:6px}
.db2{display:block;width:100%;text-align:left;padding:7px 10px;border:1px solid var(--bdr);border-radius:8px;background:#fafaf8;color:var(--t2);cursor:pointer;font-size:12px;margin-bottom:4px}
.db2:hover{background:#f1f0ec}
#le{font-size:12px;color:#b91c1c;margin-top:6px;display:none}
#ap{display:flex;flex-direction:column;min-height:100vh}
.tb{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:#fff;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:30}
.tl{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.tl svg{width:16px;height:16px;fill:white}
.tb h2{font-size:15px;font-weight:600}
.tr2{margin-left:auto;display:flex;align-items:center;gap:8px}
.rp{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.rp-director{background:var(--bl);color:var(--bld)}
.rp-docente{background:var(--gl);color:var(--green)}
.rp-alumno{background:var(--al);color:var(--amb)}
.xb{font-size:12px;padding:5px 10px;border:1px solid var(--bdr);border-radius:8px;background:none;color:var(--t2);cursor:pointer}
.xb:hover{background:#f1f0ec}
.ly{display:flex;flex:1}
.sb{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--bdr);padding:12px 8px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.ng{font-size:10px;font-weight:700;color:var(--t3);padding:8px 8px 4px;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t2);border:none;background:none;width:100%;text-align:left;margin-bottom:1px}
.ni:hover{background:#f1f0ec}
.ni.active{background:var(--bl);color:var(--bld);font-weight:600}
.nd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ct{flex:1;padding:20px;min-width:0;overflow-x:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.ph h3{font-size:17px;font-weight:600}
.ph-right{display:flex;gap:8px;flex-wrap:wrap}
.bn{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.bn:hover{background:var(--bld)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.sc{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;cursor:default}
.sc .sl{font-size:11px;color:var(--t3);margin-bottom:2px}
.sc .sv{font-size:26px;font-weight:700}
.sc .ss{font-size:11px;color:var(--t2);margin-top:1px}
.sc.clickable{cursor:pointer}
.sc.clickable:hover{border-color:var(--blue);background:var(--bl)}
.card{background:#fff;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-p{padding:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;background:#fafaf8;color:var(--t2);font-weight:600;font-size:12px;border-bottom:1px solid var(--bdr)}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.bx{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.bg{background:var(--gl);color:var(--green)}
.br{background:var(--rl);color:var(--red)}
.bb{background:var(--bl);color:var(--bld)}
.ba{background:var(--al);color:var(--amb)}
.bp2{background:var(--pl);color:var(--pur)}
.bgr{background:#f1f0ec;color:#5f5e5a}
.bora{background:#fff3e0;color:#e65100}
.abs{display:flex;gap:4px;flex-wrap:wrap}
.bs{padding:4px 10px;font-size:12px;border:1px solid var(--bdr);border-radius:6px;background:#fff;color:var(--txt);cursor:pointer;white-space:nowrap}
.bs:hover{background:#f1f0ec}
.bs.d{color:#b91c1c;border-color:#fca5a5}.bs.d:hover{background:var(--rl)}
.bs.i{color:var(--bld);border-color:#93c5fd}.bs.i:hover{background:var(--bl)}
.bs.s{color:var(--green);border-color:#86efac}.bs.s:hover{background:var(--gl)}
.bs.o{color:var(--amb);border-color:#fcd34d}.bs.o:hover{background:var(--al)}
.es{text-align:center;padding:40px;color:var(--t3);font-size:14px}
.fb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb select{padding:7px 10px;font-size:13px;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);width:auto}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
.modal{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:1.5rem;width:100%;max-width:560px}
.modal h4{font-size:16px;font-weight:600;margin-bottom:1.2rem}
.modal-lg{max-width:860px}
.fg{display:grid;gap:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.nota-inp{width:58px!important;padding:5px 4px!important;text-align:center;border:1px solid var(--bdr);border-radius:6px;font-size:13px}
.nota-inp:focus{border-color:var(--blue)}
.nota-inp:disabled{background:#f5f5f3;color:var(--t3);cursor:not-allowed}
.nota-col{text-align:center}
.prom-tag{display:inline-flex;align-items:center;justify-content:center;min-width:36px;padding:4px 8px;border-radius:8px;font-size:14px;font-weight:700}
.nota-tag{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:4px 10px;border-radius:20px;font-size:15px;font-weight:800}
.n5{background:#EAF3DE;color:#27500A}
.n4{background:#E6F1FB;color:#0C447C}
.n3{background:#EEEDFE;color:#3C3489}
.n2{background:#FAEEDA;color:#633806}
.n1{background:#FCEBEB;color:#791F1F}
.n-{background:#f1f0ec;color:#888}
.asopt{padding:7px 14px;border:1px solid var(--bdr);border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;background:#fff;color:var(--t2)}
.asopt.P{background:var(--gl);color:var(--green);border-color:#86efac}
.asopt.A{background:var(--rl);color:var(--red);border-color:#fca5a5}
.asopt.T{background:var(--al);color:var(--amb);border-color:#fcd34d}
.asopt.J{background:var(--bl);color:var(--bld);border-color:#93c5fd}
.cur-tag{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--pl);color:var(--pur);font-weight:600}
.tip{font-size:12px;color:var(--t3);margin-top:4px}
.peso-box{background:#fafaf8;border:1px solid var(--bdr);border-radius:8px;padding:10px;font-size:12px}
.peso-box .titulo{font-weight:600;font-size:13px;margin-bottom:6px}
.iz{border:2px dashed var(--bdr);border-radius:10px;padding:24px;text-align:center;cursor:pointer;color:var(--t2);font-size:13px}
.iz:hover{border-color:var(--blue);color:var(--blue);background:var(--bl)}
.ir{margin-top:10px;padding:10px;border-radius:8px;font-size:13px}
.ir.ok{background:var(--gl);color:var(--green)}
.ir.err{background:var(--rl);color:var(--red)}
.rec-indicator{font-size:10px;color:var(--amb);font-weight:600;display:block}
/* Avisos */
.aviso-card{border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:#fff}
.aviso-card.urgente{border-left:4px solid var(--red);background:var(--rl)}
.aviso-card.examen{border-left:4px solid var(--blue);background:var(--bl)}
.aviso-card.administrativo{border-left:4px solid var(--amb);background:var(--al)}
.aviso-card.info{border-left:4px solid var(--green);background:var(--gl)}
.aviso-titulo{font-size:14px;font-weight:700;margin-bottom:4px}
.aviso-meta{font-size:11px;color:var(--t3);margin-top:6px}
/* Calendario */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.cal-hdr{text-align:center;font-size:11px;font-weight:700;color:var(--t3);padding:4px}
.cal-day{border:1px solid var(--bdr);border-radius:8px;padding:6px;min-height:64px;background:#fff;font-size:12px;cursor:default}
.cal-day.today{border-color:var(--blue);background:var(--bl)}
.cal-day.has-exam{cursor:pointer}
.cal-day.has-exam:hover{background:#f0f9ff}
.cal-day-num{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:600}
.cal-event{font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event.Parcial{background:var(--bl);color:var(--bld)}
.cal-event.Final{background:var(--rl);color:var(--red)}
.cal-event.Recuperatorio{background:var(--al);color:var(--amb)}
/* Barra de progreso notas */
.prog-bar{height:6px;border-radius:3px;background:#e5e4df;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s}
/* Print */
@media print{
  .sb,.tb,.mf,.bn,.bs,.fb,.abs{display:none!important}
  .ct{padding:0}
  body{background:#fff}
  .card{border:none;box-shadow:none}
}
</style>
</head>
<body>

<div id="lp">
<div class="lc">
  <div class="ll">
    <div class="lb"><svg viewBox="0 0 24 24"><path d="M12 3L2 8v8l10 5 10-5V8L12 3zm0 2.18L20 9v.09L12 13.09 4 9.09V9l8-3.82zM4 11.28l8 4 8-4V17l-8 4-8-4v-5.72z"/></svg></div>
    <h1>Instituto Técnico Superior</h1>
    <p>Santísima Trinidad — Sistema Académico</p>
  </div>
  <div class="f"><label>Email o C.I.</label><input id="lem" placeholder="director@its.edu.py"/></div>
  <div class="f"><label>Contraseña</label><input id="lps" type="password" placeholder="••••••"/></div>
  <button class="bp" onclick="doLogin()">Ingresar al sistema</button>
  <div id="le" style="font-size:12px;color:#b91c1c;margin-top:6px;display:none">Email/CI o contraseña incorrectos</div>
  <div class="dl">
    <p>Acceso rápido:</p>
    <button class="db2" onclick="ql('director@its.edu.py','director123')">Director — acceso total</button>
  </div>
</div>
</div>

<div id="ap" class="hidden">
<div class="tb">
  <div class="tl"><svg viewBox="0 0 24 24"><path d="M12 3L2 8v8l10 5 10-5V8L12 3zm0 2.18L20 9v.09L12 13.09 4 9.09V9l8-3.82zM4 11.28l8 4 8-4V17l-8 4-8-4v-5.72z"/></svg></div>
  <h2>ITS — Sistema Académico</h2>
  <div class="tr2">
    <span id="un" style="font-size:13px;color:var(--t2)"></span>
    <span id="rp" class="rp"></span>
    <button class="xb" onclick="logout()">Salir</button>
  </div>
</div>
<div class="ly">
  <nav class="sb" id="nav"></nav>
  <div class="ct" id="mc"></div>
</div>
</div>
<div id="mr"></div>

<script>
const API='';let tok=localStorage.getItem('its_tk3');let me=null;const W=window;

async function api(m,u,b,isFile){
  const o={method:m,headers:{}};
  if(tok)o.headers.Authorization='Bearer '+tok;
  if(b&&!isFile){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b);}
  else if(b)o.body=b;
  const r=await fetch(API+u,o);
  if(!r.ok){const e=await r.json().catch(()=>({error:'Error'}));throw new Error(e.error||'Error');}
  return r.json();
}

async function doLogin(){
  document.getElementById('le').style.display='none';
  try{
    const res=await api('POST','/api/login',{email:v('lem'),password:v('lps')});
    tok=res.token;me=res.user;localStorage.setItem('its_tk3',tok);startApp();
  }catch{document.getElementById('le').style.display='block';}
}
function ql(e,p){document.getElementById('lem').value=e;document.getElementById('lps').value=p;}
function logout(){tok=null;me=null;localStorage.removeItem('its_tk3');show('lp');hide('ap');}

function startApp(){
  hide('lp');show('ap');
  document.getElementById('un').textContent=me.nombre+' '+me.apellido;
  const rp=document.getElementById('rp');rp.textContent=me.rol;rp.className='rp rp-'+me.rol;
  buildNav();go('dashboard');
}

function navFor(r){
  return [
    {g:'General',i:[
      {id:'dashboard',l:'Dashboard',c:'#185FA5',r:['director','docente','alumno']},
      {id:'calendario',l:'Calendario de Exámenes',c:'#D85A30',r:['director','docente','alumno']},
      {id:'calendario-clases',l:'Horario Semanal',c:'#1D9E75',r:['director','docente','alumno']},
      {id:'avisos',l:'Avisos',c:'#1D9E75',r:['director','docente','alumno']},
    ]},
    {g:'Estructura',i:[
      {id:'carreras',l:'Carreras',c:'#7F77DD',r:['director']},
      {id:'cursos',l:'Cursos / Grupos',c:'#D85A30',r:['director']},
      {id:'materias',l:'Materias',c:'#BA7517',r:['director']},
      {id:'periodos',l:'Períodos',c:'#1D9E75',r:['director']},
    ]},
    {g:'Personas',i:[
      {id:'docentes',l:'Docentes',c:'#BA7517',r:['director']},
      {id:'alumnos',l:'Alumnos',c:'#E24B4A',r:['director']},
      {id:'asignaciones',l:'Asignaciones',c:'#888780',r:['director']},
    ]},
    {g:'Académico',i:[
      {id:'examenes',l:'Exámenes',c:'#D85A30',r:['director']},
      {id:'notas',l:'Notas',c:'#185FA5',r:['director','docente']},
      {id:'asistencia',l:'Asistencia',c:'#1D9E75',r:['director','docente']},
    ]},
    {g:'Finanzas',i:[
      {id:'pagos',l:'Pagos',c:'#7F77DD',r:['director']},
      {id:'aranceles',l:'Aranceles / Costos',c:'#1D9E75',r:['director']},
      {id:'deudores',l:'Control Deudores',c:'#E24B4A',r:['director']},
      {id:'becas',l:'Becas y Descuentos',c:'#1D9E75',r:['director']},
    ]},
    {g:'Mi área',i:[
      {id:'mis-materias',l:'Mis materias',c:'#185FA5',r:['docente']},
      {id:'mis-notas',l:'Mis calificaciones',c:'#185FA5',r:['alumno']},
      {id:'mi-asistencia',l:'Mi asistencia',c:'#1D9E75',r:['alumno']},
      {id:'mi-estado-cuenta',l:'Estado de cuenta',c:'#7F77DD',r:['alumno']},
    ]},
    {g:'Cuenta',i:[
      {id:'perfil',l:'Mi perfil',c:'#1D9E75',r:['director','docente','alumno']},
    ]},
    {g:'Configuración',i:[
      {id:'usuarios',l:'Usuarios y accesos',c:'#7F77DD',r:['director']},
      {id:'escala',l:'Escala de notas',c:'#D85A30',r:['director']},
      {id:'institucion',l:'Institución',c:'#888780',r:['director']},
    ]},
  ].map(g=>({...g,i:g.i.filter(x=>x.r.includes(r))})).filter(g=>g.i.length);
}
function buildNav(){
  document.getElementById('nav').innerHTML=navFor(me.rol).map(g=>`
    <div class="ng">${g.g}</div>
    ${g.i.map(i=>`<button class="ni" id="ni-${i.id}" onclick="go('${i.id}')"><span class="nd" style="background:${i.c}"></span>${i.l}</button>`).join('')}
  `).join('');
}

let cur='';
function go(p){
  cur=p;
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  document.getElementById('ni-'+p)?.classList.add('active');
  const el=document.getElementById('mc');
  el.innerHTML='<div class="es">Cargando...</div>';
  const pages={dashboard:pgDash,carreras:pgCarreras,cursos:pgCursos,materias:pgMaterias,
    periodos:pgPeriodos,docentes:pgDocentes,alumnos:pgAlumnos,asignaciones:pgAsig,
    examenes:pgExamenes,calendario:pgCalendario,'calendario-clases':pgCalClases,notas:pgNotas,asistencia:pgAsist,
    pagos:pgPagos,aranceles:pgAranceles,deudores:pgDeudores,becas:pgBecas,avisos:pgAvisos,
    escala:pgEscala,institucion:pgInst,usuarios:pgUsuarios,
    perfil:pgPerfil,'mis-materias':pgMisMat,'mis-notas':pgMisNotas,
    'mi-asistencia':pgMiAsistencia,'mi-estado-cuenta':pgMiEstadoCuenta};
  pages[p]?.(el);
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function modal(h,lg){document.getElementById('mr').innerHTML=`<div class="mb" onclick="if(event.target===this)cm()"><div class="modal${lg?' modal-lg':''}">${h}</div></div>`;}
function cm(){document.getElementById('mr').innerHTML='';}
function v(id){return document.getElementById(id)?.value||'';}
function J(o){try{return btoa(unescape(encodeURIComponent(JSON.stringify(o))));}catch{return '';}}
function DJ(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch{return {};}}
function show(id){document.getElementById(id)?.classList.remove('hidden');}
function hide(id){document.getElementById(id)?.classList.add('hidden');}
function notaCls(n){return n?'n'+Math.min(5,Math.max(1,n)):'n-';}
function fmtFecha(f){if(!f)return '-';const d=new Date(f+'T00:00:00');return d.toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'numeric'});}
function exportXls(tabla){window.open('/api/export/'+tabla,'_blank');}

async function del(id,tipo){
  const msgs={carreras:'¿Eliminar carrera?',cursos:'¿Eliminar curso?',materias:'¿Eliminar materia?',docentes:'¿Eliminar docente?',alumnos:'¿Eliminar alumno?',periodos:'¿Eliminar período?',asignaciones:'¿Eliminar asignación?',examenes:'¿Eliminar este examen?',avisos:'¿Eliminar aviso?',pagos:'¿Eliminar pago?',becas:'¿Eliminar beca?'};
  if(!confirm(msgs[tipo]||'¿Eliminar?'))return;
  await api('DELETE','/api/'+tipo+'/'+id);go(cur);
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
async function pgDash(el){
  const d=await api('GET','/api/dashboard');
  const hoy=new Date().toLocaleDateString('es-PY',{weekday:'long',day:'numeric',month:'long'});
  el.innerHTML=`
  <div class="ph"><h3>Dashboard — ${d.periodo_activo}</h3><span style="font-size:13px;color:var(--t3)">${hoy}</span></div>

  ${d.avisos?.length?`<div style="margin-bottom:16px">
    ${d.avisos.map(a=>`<div class="aviso-card ${a.tipo}">
      ${a.fijado?'📌 ':''}<span class="aviso-titulo">${a.titulo}</span>
      <div style="font-size:13px;margin-top:4px">${a.contenido}</div>
    </div>`).join('')}
  </div>`:''}

  <div class="sr">

async function ejecutarContinuidad(pid){
  try{
    const r=await api('POST','/api/periodos/'+pid+'/promover',{modo:'continuidad'});
    document.getElementById('promMsg').innerHTML=`<div class="ir ok">✓ ${r.copiadas} asignaciones copiadas del período anterior</div>`;
  }catch(e){document.getElementById('promMsg').innerHTML=`<div class="ir err">${e.message}</div>`;}
}
async function ejecutarPromocion(pid){
  const orig=v('prom_orig'), dest=v('prom_dest');
  if(!orig||!dest)return alert('Seleccionar curso origen y destino');
  if(!confirm('¿Confirmar promoción masiva? Los alumnos cambiarán de curso.'))return;
  try{
    const r=await api('POST','/api/periodos/'+pid+'/promover',{modo:'promocion',curso_origen_id:orig,curso_destino_id:dest});
    document.getElementById('promMsg').innerHTML=`<div class="ir ok">✓ ${r.promovidos} alumnos promovidos al nuevo curso</div>`;
  }catch(e){document.getElementById('promMsg').innerHTML=`<div class="ir err">${e.message}</div>`;}
}

// ── VER MATERIAS DOCENTE (supervisión integrada en sección Docentes) ──────────
async function verMateriasDocente(docId, nombre){
  if(!docId)return;
  const asigs=await api('GET','/api/asignaciones/docente/'+docId);
  const total=asigs.reduce((a,x)=>a+x.total_alumnos,0);
  const cargadas=asigs.reduce((a,x)=>a+x.notas_cargadas,0);
  const pctGlobal=total?Math.round(cargadas/total*100):0;
  modal(`<h4>📋 ${nombre} — Materias asignadas</h4>
  <div style="background:#f0f7ff;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span>${asigs.length} materias · ${total} alumnos</span>
        <strong>${cargadas}/${total} notas (${pctGlobal}%)</strong>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pctGlobal}%"></div></div>
    </div>
  </div>
  ${asigs.length?`<div style="overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse">
    <thead><tr style="background:#f5f5f5">
      <th style="padding:7px 10px;text-align:left;border-bottom:1px solid var(--bdr)">Materia</th>
      <th style="padding:7px 8px;text-align:left;border-bottom:1px solid var(--bdr)">Carrera/Curso</th>
      <th style="padding:7px 8px;text-align:center;border-bottom:1px solid var(--bdr)">Parciales</th>
      <th style="padding:7px 8px;text-align:center;border-bottom:1px solid var(--bdr)">Finales</th>
      <th style="padding:7px 8px;text-align:center;border-bottom:1px solid var(--bdr)">Completas</th>
      <th style="padding:7px 8px;text-align:center;border-bottom:1px solid var(--bdr)">Estado</th>
      <th style="padding:7px 8px;border-bottom:1px solid var(--bdr)"></th>
    </tr></thead>
    <tbody>
    ${asigs.map(a=>{
      const pctN=a.total_alumnos?Math.round(a.notas_cargadas/a.total_alumnos*100):0;
      const pctP=a.total_alumnos?Math.round(a.parciales_cargados/a.total_alumnos*100):0;
      const pctF=a.total_alumnos?Math.round(a.finales_cargados/a.total_alumnos*100):0;
      const est=pctN===100?'bg':pctN>0?'ba':'br';
      const estLabel=pctN===100?'Completo':pctN>0?'En proceso':'Sin cargar';
      return `<tr style="border-bottom:1px solid var(--bdr)">
        <td style="padding:8px 10px"><strong>${a.materia_nombre}</strong></td>
        <td style="padding:8px 8px"><span class="cur-tag">${a.carrera_nombre} ${a.curso_anio}°${a.curso_division==='U'?'':a.curso_division}</span></td>
        <td style="padding:8px 8px;text-align:center">
          <div style="font-size:11px">${a.parciales_cargados}/${a.total_alumnos}</div>
          <div class="prog-bar" style="width:60px;margin:0 auto"><div class="prog-fill" style="width:${pctP}%;background:var(--amb)"></div></div>
        </td>
        <td style="padding:8px 8px;text-align:center">
          <div style="font-size:11px">${a.finales_cargados}/${a.total_alumnos}</div>
          <div class="prog-bar" style="width:60px;margin:0 auto"><div class="prog-fill" style="width:${pctF}%;background:var(--red)"></div></div>
        </td>
        <td style="padding:8px 8px;text-align:center">
          <div style="font-size:11px">${a.notas_cargadas}/${a.total_alumnos} (${pctN}%)</div>
          <div class="prog-bar" style="width:60px;margin:0 auto"><div class="prog-fill" style="width:${pctN}%"></div></div>
        </td>
        <td style="padding:8px 8px;text-align:center"><span class="bx ${est}">${estLabel}</span></td>
        <td style="padding:8px 8px">
          <div class="abs">
            <button class="bs i" onclick="cm();setTimeout(()=>{go('notas');setTimeout(()=>W.loadNotas('${a.id||a.asignacion_id}'),600);},100)">Cargar notas</button>
            <button class="bs o" onclick="W.imprimirActa('${a.id||a.asignacion_id}')">Acta</button>
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`:'<div class="es">Este docente no tiene asignaciones en el período activo</div>'}
  <div class="mf"><button class="bs" onclick="cm()">Cerrar</button></div>`,true);
}

function filtAlCursos(){
  const carrId=v('filtAlCarr');
  const sel=document.getElementById('filtAlCurso');
  if(!sel)return;
  const cursos=(W._cursos||[]).filter(cu=>!carrId||cu.carrera_id===carrId);
  sel.innerHTML='<option value="">Todos los cursos</option>'+cursos.map(cu=>`<option value="${cu.id}">${cu.carrera_nombre} ${cu.anio}°${cu.division==='U'?'':cu.division}${cu.turno?' T'+cu.turno:''}</option>`).join('');
}
function fAlAll(){
  const bus=(v('filtAlBus')||'').toLowerCase().trim();
  const carrId=v('filtAlCarr');
  const anio=v('filtAlAnio');
  const cursoId=v('filtAlCurso');
  const turno=v('filtAlTurno');
  const tb=document.getElementById('altb');if(!tb)return;
  let l=W._als||[];
  if(bus)l=l.filter(a=>(a.display_nombre||'').toLowerCase().includes(bus)||(a.display_apellido||'').toLowerCase().includes(bus)||(a.display_ci||'').toLowerCase().includes(bus));
  if(carrId) l=l.filter(a=>a.carrera_id===carrId);
  if(anio)   l=l.filter(a=>String(a.curso_anio||a.anio)===anio);
  if(cursoId)l=l.filter(a=>a.curso_id===cursoId);
  if(turno){const ct=new Set((W._cursos||[]).filter(cu=>String(cu.turno)===turno).map(cu=>cu.id));l=l.filter(a=>ct.has(a.curso_id));}
  tb.innerHTML=l.map(aRow).join('')||'<tr><td colspan="7" class="es">Sin alumnos</td></tr>';
}
function fAl(t,val){if(t==='c'){const el=document.getElementById('filtAlCarr');if(el)el.value=val;}if(t==='cu'){const el=document.getElementById('filtAlCurso');if(el)el.value=val;}fAlAll();}

  const sel=document.getElementById('impCurs');
  if(!sel)return;

  sel.innerHTML='<option value="">Sin asignar curso</option>'+cursos.map(cu=>`<option value="${cu.id}">${cu.anio}°${cu.division==='U'?'':cu.division}</option>`).join('');

async function doImp(inp){
  const file=inp.files[0];if(!file)return;
  const carrId=v('impCarr');
  if(!carrId){document.getElementById('ires').innerHTML='<div class="ir err">Seleccionar una carrera primero</div>';return;}
  const fd=new FormData();
  fd.append('archivo',file);
  fd.append('carrera_id',carrId);
  fd.append('curso_id',v('impCurs')||'');
  document.getElementById('ires').innerHTML='<div class="ir" style="background:#f0f7ff">Procesando...</div>';
  try{
    const r=await api('POST','/api/alumnos/importar',fd,true);
    const carr=r.carrera||'';
    const msg=`✓ ${r.ok} nuevos · ${r.actualizados||0} actualizados en <strong>${carr}</strong>`;
    document.getElementById('ires').innerHTML=`<div class="ir ok">${msg}</div>${r.errores?.length?`<div class="ir err" style="margin-top:6px;font-size:12px">${r.errores.slice(0,5).join('<br>')}</div>`:''}`;
    if((r.ok+r.actualizados)>0)setTimeout(()=>{cm();go('alumnos');},2200);
  }catch(e){document.getElementById('ires').innerHTML=`<div class="ir err">${e.message}</div>`;}
}

function toggleNuevoDoc(){

async function crearDocInline(){
  const o={nombre:v('nd_nom'),apellido:v('nd_ape'),ci:v('nd_ci'),email:v('nd_em'),titulo:v('nd_tit'),especialidad:v('nd_esp'),password:v('nd_pw')||'docente123'};
  if(!o.nombre||!o.apellido)return alert('Nombre y apellido son obligatorios');
  if(!o.ci)return alert('La CI es obligatoria para crear el docente');
  try{
    const r=await api('POST','/api/docentes',o);
    // Recargar lista de docentes y actualizar el select
    const docs=await api('GET','/api/docentes');
    W._adata.docs=docs;
    const sel=document.getElementById('asd');
    if(sel){
      sel.innerHTML=docs.map(d=>`<option value="${d.docente_id}">${d.nombre} ${d.apellido} ${d.especialidad?'— '+d.especialidad:''}</option>`).join('');
      // Seleccionar el docente recién creado
      if(r.docente_id)sel.value=r.docente_id;
    }
    // Cerrar panel
    const p=document.getElementById('nuevoDocPanel');
    if(p)p.style.display='none';
    // Feedback
    const lbl=document.querySelector('label[for="asd"]')||document.getElementById('asd')?.previousElementSibling;
    const fb=document.createElement('span');
    fb.style.cssText='color:#2e7d32;font-size:11px;margin-left:8px';
    fb.textContent=`✓ ${o.nombre} ${o.apellido} creado`;
    document.getElementById('asd')?.parentNode?.appendChild(fb);
    setTimeout(()=>fb.remove(),3000);
  }catch(e){alert('Error al crear docente: '+e.message);}
}
function filtCursosAsig(){
  const carrId=v('asc_carr');
  const sel=document.getElementById('asc');
  if(!sel)return;
  const cursos=(W._adata?.cursos||[]).filter(cu=>!carrId||cu.carrera_id===carrId);
  sel.innerHTML=cursos.map(cu=>`<option value="${cu.id}">${cu.carrera_nombre} — ${cu.anio}°${cu.division==='U'?'':cu.division}</option>`).join('');
  // Filtrar materias también
  const selMat=document.getElementById('asm');
  if(selMat){
    const carr=(W._adata?.cursos||[]).find(c=>c.carrera_id===carrId);
    const mats=(W._adata?.mats||[]).filter(m=>!carrId||m.carrera_id===carrId);
    selMat.innerHTML=mats.map(m=>`<option value="${m.id}">${m.nombre} — ${m.anio}°</option>`).join('');
  }
}
async function svAsig(){
  const dia=v('asdia'),turno=parseInt(v('asturno'))||1;
  const horaMap={1:{i:'19:00',f:'20:20'},2:{i:'20:40',f:'22:00'}};
  const payload={
    docente_id:v('asd'),materia_id:v('asm'),curso_id:v('asc'),periodo_id:parseInt(v('asp')),
    dia:dia||null,turno,hora_inicio:horaMap[turno].i,hora_fin:horaMap[turno].f,aula:v('asaula')||null
  };
  if(!payload.docente_id||!payload.materia_id||!payload.curso_id)return alert('Docente, materia y curso son obligatorios');
  try{
    const r=await api('POST','/api/asignaciones',payload);
    cm();go('asignaciones');
    if(dia)setTimeout(()=>alert(`✓ Asignación creada. Espacio de notas generado y registrado en horario semanal (${dia}, Turno ${turno}).`),400);

}

function renderHorario(){
  const dias=['Lunes','Martes','Miércoles','Jueves','Viernes'];
  const colores={'Agropecuaria':'#dcedc8','Contabilidad':'#bbdefb','Cosmiatría':'#f8bbd0','Criminalística':'#ffe0b2','Electricidad':'#e1bee7','Enfermería':'#b2ebf2','Farmacia':'#fff9c4','Instrumentación':'#d1c4e9','Radiología':'#c5cae9'};
  const getColor=n=>{const k=Object.keys(colores).find(k=>n?.includes(k));return k?colores[k]:'#e0e0e0';};
  let h=W._horarios||[];
  const fc=document.getElementById('filtHorCarr')?.value||'';
  const fd=document.getElementById('filtHorDoc')?.value||'';
  if(fc)h=h.filter(x=>x.carrera_nombre?.includes(fc));
  if(fd)h=h.filter(x=>(x.docente_nombre+' '+x.docente_apellido)===fd);
  const turno1=h.filter(x=>x.turno===1);
  const turno2=h.filter(x=>x.turno===2);
  const cell=(lista,dia)=>{
    const items=lista.filter(x=>x.dia===dia);
    if(!items.length)return `<td style="border:1px solid var(--bdr);padding:6px;vertical-align:top;min-width:150px;background:#fafaf8"><span style="color:var(--t3);font-size:11px">—</span></td>`;
    return `<td style="border:1px solid var(--bdr);padding:6px;vertical-align:top;min-width:150px">
      ${items.map(i=>`<div style="background:${getColor(i.carrera_nombre)};border-radius:6px;padding:5px 8px;margin-bottom:4px;font-size:11px">
        <div style="font-weight:700;color:#333">${i.materia_nombre||'Sin asignar'}</div>
        <div style="color:#555;margin-top:1px">${i.carrera_nombre||''} ${i.curso_anio?i.curso_anio+'°':''}</div>
        <div style="color:#777;font-size:10px;margin-top:2px">${i.docente_nombre?i.docente_nombre+' '+i.docente_apellido:'Sin docente'}</div>
      </div>`).join('')}
    </td>`;
  };
  const el=document.getElementById('tablaHorario');
  if(!el)return;
  el.innerHTML=`<table style="border-collapse:collapse;width:100%;font-size:12px">
    <thead>
      <tr><th style="padding:8px 10px;background:#185FA5;color:#fff;border:1px solid #1565c0;min-width:100px">Turno / Horario</th>
      ${dias.map(d=>`<th style="padding:8px 10px;background:#185FA5;color:#fff;border:1px solid #1565c0;text-align:center">${d}</th>`).join('')}</tr>
    </thead>
    <tbody>
      <tr style="background:#e8f5e9">
        <td style="border:1px solid var(--bdr);padding:8px 10px;font-weight:700;white-space:nowrap;background:#c8e6c9">
          <div style="font-size:13px">1er Turno</div>
          <div style="font-size:11px;color:#555">19:00 – 20:20</div>
        </td>
        ${dias.map(d=>cell(turno1,d)).join('')}
      </tr>
      <tr style="background:#fff8e1"><td colspan="6" style="border:1px solid var(--bdr);padding:6px 10px;text-align:center;font-size:11px;color:var(--t2);font-style:italic">✦ RECESO — 20:20 a 20:40 hs ✦</td></tr>
      <tr>
        <td style="border:1px solid var(--bdr);padding:8px 10px;font-weight:700;white-space:nowrap;background:#fff3e0">
          <div style="font-size:13px">2do Turno</div>
          <div style="font-size:11px;color:#555">20:40 – 22:00</div>
        </td>
        ${dias.map(d=>cell(turno2,d)).join('')}
      </tr>
    </tbody>
  </table>`;
}

// ── CALENDARIO DE EXÁMENES ────────────────────────────────────────────────────
async function pgCalendario(el){
  const hoy=new Date();
  W._calFecha={anio:hoy.getFullYear(),mes:hoy.getMonth()};
  W._calEl=el;
  await renderCalendario(el);
}
async function renderCalendario(el){
  const {anio,mes}=W._calFecha;
  const desde=`${anio}-${String(mes+1).padStart(2,'0')}-01`;
  const ultimo=new Date(anio,mes+1,0);
  const hasta=`${anio}-${String(mes+1).padStart(2,'0')}-${String(ultimo.getDate()).padStart(2,'0')}`;
  const filtDoc=me.rol==='docente'&&me.docenteId?'&docente_id='+me.docenteId:'';
  const [exs,acts]=await Promise.all([
    api('GET',`/api/examenes/calendario?desde=${desde}&hasta=${hasta}${filtDoc}`),
    api('GET',`/api/actividades?desde=${desde}&hasta=${hasta}`).catch(()=>[])
  ]);
  const porFecha={};
  exs.forEach(e=>{if(!porFecha[e.fecha])porFecha[e.fecha]=[];porFecha[e.fecha].push({...e,_tipo:'examen'});});
  (acts||[]).forEach(a=>{if(!porFecha[a.fecha])porFecha[a.fecha]=[];porFecha[a.fecha].push({...a,_tipo:'actividad'});});
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const hoyStr=new Date().toISOString().split('T')[0];
  const primerDia=new Date(anio,mes,1).getDay();
  const totalDias=ultimo.getDate();
  let celdas='';
  for(let i=0;i<primerDia;i++)celdas+=`<div></div>`;
  for(let d=1;d<=totalDias;d++){
    const fStr=`${anio}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=porFecha[fStr]||[];
    const isHoy=fStr===hoyStr;
    celdas+=`<div class="cal-day${isHoy?' today':''}${evs.length?' has-exam':''}" onclick="verDia('${fStr}')" title="${evs.length?evs.length+' evento(s)':''}${me&&me.rol==='director'?' · Clic para ver/agregar':''}">
      <div class="cal-day-num">${d}</div>
      ${evs.slice(0,2).map(e=>e._tipo==='actividad'
        ?`<div class="cal-event" style="background:#e8f5e9;color:#2e7d32;font-size:9px;padding:1px 4px;margin-bottom:1px;border-radius:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📌 ${(e.titulo||'').substring(0,13)}</div>`
        :`<div class="cal-event ${e.tipo}">${e.tipo[0]} · ${(e.materia_nombre||'').substring(0,11)}</div>`
      ).join('')}
      ${evs.length>2?`<div style="font-size:9px;color:var(--t3)">+${evs.length-2} más</div>`:''}
    </div>`;
  }
  el.innerHTML=`<div class="ph"><h3>Calendario Académico — ${meses[mes]} ${anio}</h3>
    <div class="ph-right">
      ${me.rol==='director'?`<button class="bs i" onclick="mActividad()">+ Actividad</button>
      <button class="bn" onclick="go('examenes')">Gestionar exámenes</button>`:''}
    </div></div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <button class="bs" onclick="cambiarMes(-1)">← Anterior</button>
    <strong style="font-size:15px">${meses[mes]} ${anio}</strong>
    <button class="bs" onclick="cambiarMes(1)">Siguiente →</button>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:10px;font-size:11px;flex-wrap:wrap">
    <span><span class="cal-event Parcial" style="display:inline-block">P</span> Parcial</span>
    <span><span class="cal-event Final" style="display:inline-block">F</span> Final</span>
    <span class="bx bg" style="font-size:10px">📌 Actividad</span>
  </div>
  <div class="card card-p">
    <div class="cal-grid">${dias.map(d=>`<div class="cal-hdr">${d}</div>`).join('')}${celdas}</div>
  </div>
  ${(acts||[]).length?`<div class="card" style="margin-top:12px"><div class="card-p">
    <p style="font-weight:700;margin-bottom:8px;font-size:13px">📌 Actividades de ${meses[mes]}</p>
    ${(acts||[]).map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bdr)">
      <div>
        <span style="font-weight:600;font-size:13px">${a.titulo}</span>
        <span style="font-size:11px;color:var(--t2);margin-left:8px">${fmtFecha(a.fecha)}</span>
        ${a.carrera_nombre?`<span class="cur-tag" style="margin-left:6px">${a.carrera_nombre}</span>`:''}
        ${a.descripcion?`<div style="font-size:11px;color:var(--t3);margin-top:2px">${a.descripcion}</div>`:''}
      </div>
      ${me.rol==='director'?`<div class="abs">
        <button class="bs d" onclick="delAct('${a.id}')">Eliminar</button>
      </div>`:''}
    </div>`).join('')}
  </div></div>`:''}
  <div id="diaDetalle"></div>`;
  W._calExs=exs; W._calActs=acts||[];
}
W.cambiarMes=(d)=>{W._calFecha.mes+=d;if(W._calFecha.mes>11){W._calFecha.mes=0;W._calFecha.anio++;}if(W._calFecha.mes<0){W._calFecha.mes=11;W._calFecha.anio--;}renderCalendario(W._calEl||document.getElementById('mc'));};
function verDia(fecha){
  const exs=(W._calExs||[]).filter(e=>e.fecha===fecha);
  const acts=(W._calActs||[]).filter(a=>a.fecha===fecha);
  const el=document.getElementById('diaDetalle');
  if(!el)return;
  let html=`<div class="ph" style="margin-top:16px"><h3 style="font-size:15px">Eventos del ${fmtFecha(fecha)}</h3>
    ${me.rol==='director'?`<button class="bs i" onclick="mActividadFecha('${fecha}')">+ Actividad</button>`:''}
  </div>`;
  acts.forEach(a=>{html+=`<div class="card card-p" style="margin-bottom:8px;border-left:3px solid #4caf50"><p style="font-weight:700">📌 ${a.titulo}</p><p style="font-size:12px;color:var(--t2)">${a.descripcion||''}</p></div>`;});
  exs.forEach(e=>{
    const pct=e.total_alumnos?Math.round(e.notas_cargadas/e.total_alumnos*100):0;
    html+=`<div class="card card-p" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div><span class="bx ${e.tipo==='Final'?'br':e.tipo==='Parcial'?'bb':'ba'}">${e.tipo}</span><strong style="font-size:15px;margin-left:8px">${e.materia_nombre}</strong></div>
        <div class="abs">
          <button class="bs i" onclick="abrirNotasExamen('${e.asignacion_id}','${e.tipo}')">Cargar notas</button>
          <button class="bs o" onclick="imprimirActa('${e.asignacion_id}')">Acta</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px;font-size:12px">
        <div><span style="color:var(--t3)">Carrera</span><br><strong>${e.carrera_nombre} ${e.curso_anio}°${e.curso_division==='U'?'':e.curso_division}</strong></div>
        <div><span style="color:var(--t3)">Docente</span><br><strong>${e.docente_nombre} ${e.docente_apellido}</strong></div>
        <div><span style="color:var(--t3)">Hora</span><br><strong>${e.hora||'Sin especificar'}</strong></div>
        <div><span style="color:var(--t3)">Notas</span><br><strong>${e.notas_cargadas}/${e.total_alumnos} (${pct}%)</strong><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>
      </div>
    </div>`;
  });
  if(!exs.length&&!acts.length)html+=`<div class="es">Sin eventos este día${me.rol==='director'?' — podés agregar una actividad':''}</div>`;
  el.innerHTML=html;
}
async function mActividad(act){
  const isEdit=!!act;
  const [carrs,mats]=await Promise.all([api('GET','/api/carreras'),api('GET','/api/materias')]);
  modal(`<h4>${isEdit?'Editar':'Nueva'} actividad académica</h4><div class="fg">
    <div class="f"><label>Título <span style="color:var(--red)">*</span></label><input id="actTit" value="${isEdit&&act.titulo?act.titulo:''}" placeholder="Ej: Entrega de trabajos finales"/></div>
    <div class="fr">
      <div class="f"><label>Fecha <span style="color:var(--red)">*</span></label><input id="actFec" type="date" value="${isEdit&&act.fecha?act.fecha:new Date().toISOString().split('T')[0]}"/></div>
      <div class="f"><label>Tipo</label><select id="actTipo">
        <option value="academico" ${isEdit&&act.tipo==='academico'?'selected':''}>Académico</option>
        <option value="examen" ${isEdit&&act.tipo==='examen'?'selected':''}>Examen</option>
        <option value="administrativo" ${isEdit&&act.tipo==='administrativo'?'selected':''}>Administrativo</option>
        <option value="otros" ${!isEdit||act.tipo==='otros'?'selected':''}>Otros</option>
      </select></div>
    </div>
    <div class="f"><label>Descripción</label><textarea id="actDesc" rows="2" placeholder="Opcional">${isEdit&&act.descripcion?act.descripcion:''}</textarea></div>
    <div class="fr">
      <div class="f"><label>Carrera (opcional)</label><select id="actCarr">
        <option value="">Todas las carreras</option>
        ${carrs.map(c=>`<option value="${c.id}" ${isEdit&&act.carrera_id===c.id?'selected':''}>${c.nombre}</option>`).join('')}
      </select></div>
      <div class="f"><label>Materia (opcional)</label><select id="actMat">
        <option value="">Sin materia específica</option>
        ${mats.map(m=>`<option value="${m.id}" ${isEdit&&act.materia_id===m.id?'selected':''}>${m.nombre}</option>`).join('')}
      </select></div>
    </div>
  </div><div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="svActividad('${isEdit&&act.id?act.id:''}')">Guardar</button></div>`);
}
async function svActividad(id){
  const o={titulo:v('actTit'),fecha:v('actFec'),tipo:v('actTipo'),descripcion:v('actDesc'),carrera_id:v('actCarr')||null,materia_id:v('actMat')||null};
  if(!o.titulo||!o.fecha)return alert('Título y fecha son obligatorios');
  id?await api('PUT','/api/actividades/'+id,o):await api('POST','/api/actividades',o);
  cm();await renderCalendario(W._calEl||document.getElementById('mc'));
}
async function delAct(id){
  if(!confirm('¿Eliminar esta actividad?'))return;
  await api('DELETE','/api/actividades/'+id);
  await renderCalendario(W._calEl||document.getElementById('mc'));
}
function mActividadFecha(fecha){mActividad();setTimeout(()=>{const f=document.getElementById('actFec');if(f)f.value=fecha;},100);}
// ── NOTAS ─────────────────────────────────────────────────────────────────────
async function pgNotas(el){
  const url='/api/asignaciones'+(me.rol==='docente'&&me.docenteId?'?docente_id='+me.docenteId:'');
  const [asigs,carrs,cursos]=await Promise.all([api('GET',url),api('GET','/api/carreras'),api('GET','/api/cursos')]);
  W._notasCarrs=carrs; W._notasCursos=cursos; W._notasAsigs=asigs;
  el.innerHTML=`<div class="ph"><h3>Registro de notas</h3></div>
  <div class="fb" style="flex-wrap:wrap;gap:8px;margin-bottom:12px">
    <select id="filtNotaCarr" onchange="filtNotasCursos()" style="min-width:180px">
      <option value="">Todas las carreras</option>
      ${carrs.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
    </select>
    <select id="filtNotaCurso" onchange="filtNotasAsigs()" style="min-width:160px">
      <option value="">Todos los cursos</option>
      ${cursos.map(cu=>`<option value="${cu.id}">${cu.carrera_nombre} ${cu.anio}°${cu.division==='U'?'':cu.division}</option>`).join('')}
    </select>
    <select id="selAsigNotas" onchange="W.loadNotas(this.value)" style="min-width:220px;flex:1">
      <option value="">— Seleccionar materia —</option>
      ${asigs.map(a=>`<option value="${a.id}">${a.materia_nombre} · ${a.carrera_nombre} ${a.curso_anio}°${a.curso_division==='U'?'':a.curso_division} · ${a.periodo_nombre}</option>`).join('')}
    </select>
  </div>
  <div id="nc"></div>`;
}
function filtNotasCursos(){
  const carrId=v('filtNotaCarr');
  const selCurso=document.getElementById('filtNotaCurso');
  if(!selCurso)return;
  const cursos=(W._notasCursos||[]).filter(cu=>!carrId||cu.carrera_id===carrId);
  selCurso.innerHTML='<option value="">Todos los cursos</option>'+cursos.map(cu=>`<option value="${cu.id}">${cu.carrera_nombre} ${cu.anio}°${cu.division==='U'?'':cu.division}</option>`).join('');
  filtNotasAsigs();
}
function filtNotasAsigs(){
  const carrId=v('filtNotaCarr');
  const cursoId=v('filtNotaCurso');
  const sel=document.getElementById('selAsigNotas');
  if(!sel)return;
  let asigs=W._notasAsigs||[];
  // carrera_id ahora viene directo del backend — filtro simple y confiable
  if(carrId) asigs=asigs.filter(a=>a.carrera_id===carrId);
  if(cursoId) asigs=asigs.filter(a=>a.curso_id===cursoId);
  sel.innerHTML='<option value="">— Seleccionar materia —</option>'+asigs.map(a=>`<option value="${a.id}">${a.materia_nombre} · ${a.carrera_nombre} ${a.curso_anio}°${a.curso_division==='U'?'':a.curso_division}</option>`).join('');
  const nc=document.getElementById('nc');if(nc)nc.innerHTML='';
}

  if(!asigId)return;
  const sel=document.getElementById('selAsigNotas');
  if(sel)sel.value=asigId;
  const {alumnos}=await api('GET','/api/notas/asignacion/'+asigId);

    <div style="display:flex;gap:10px;font-size:12px;flex-wrap:wrap">
      <span class="bx bg">✓ ${aprobados} aprobados</span>
      <span class="bx br">✗ ${reprobados} reprobados</span>

    </div>

    ${me.rol==='director'?'· 🔒 Alumnos con mora de pago están bloqueados — usar "Habilitar" para autorizar excepción.':''}
  </div>
  <div style="overflow-x:auto"><table style="min-width:900px;font-size:12px;border-collapse:collapse;width:100%">
  <thead>
    <tr style="background:#f0f4f8">
      <th rowspan="2" style="padding:6px 10px;text-align:left;border:1px solid var(--bdr);min-width:160px">Alumno</th>
      <th colspan="5" style="padding:4px 8px;text-align:center;border:1px solid var(--bdr);background:#e8f5e9;color:#2e7d32">TRABAJOS PRÁCTICOS (5 pts c/u = 25 pts)</th>

        <input class="nota-inp" type="number" min="0" max="25" step="0.5" value="${a.parcial_recuperatorio??''}" placeholder="—" ${disabled?'disabled':''}
          onchange="updN('${a.id}','${asigId}','parcial_recuperatorio',this.value)" style="width:46px;text-align:center;border:none;background:transparent;padding:3px 2px;font-size:12px"/>
        ${a.parcial_recuperatorio!=null?'<div style="font-size:9px;color:#e65100;position:absolute;bottom:1px;right:2px">↑ vale</div>':''}
      </td>
      ${ni('final_ord',50,a.final_ord,'#fff3e0')}
      <td style="padding:2px 3px;border:1px solid var(--bdr);text-align:center;background:#fff8e1;position:relative">

        <input class="nota-inp" type="number" min="0" max="50" step="0.5" value="${a.complementario??''}" placeholder="—" ${disabled?'disabled':''}

        ${a.complementario!=null?'<div style="font-size:9px;color:#880e4f;position:absolute;bottom:1px;right:2px">↑ vale</div>':''}

          onchange="updN('${a.id}','${asigId}','extraordinario',this.value)" style="width:52px;text-align:center;border:none;background:transparent;padding:3px 2px;font-size:12px;font-weight:700"/>

          ? `<span style="color:#c62828;font-size:10px;font-weight:700">🔒</span>${me.rol==='director'?`<br><button onclick="habilitarAlumno('${a.id}','${W._asigId||''}')" style="font-size:9px;padding:1px 4px;border:1px solid #1976d2;border-radius:3px;background:#e3f2fd;color:#1565c0;cursor:pointer;margin-top:2px">Habilitar</button>`:''}`

async function habilitarAlumno(alId,asigId){
  if(!confirm('¿Habilitar a este alumno para cargar notas a pesar de la mora de pago? Esta acción queda registrada.'))return;
  try{
    await api('PUT','/api/alumnos/'+alId+'/habilitar-pago',{habilitado:true});
    W.loadNotas(asigId);
  }catch(e){alert('Error: '+e.message);}
}

W.marcarAusente=async(aId,asigId,ausente)=>{
  try{
    const r=await api('PUT',`/api/notas/${aId}/${asigId}`,{ausente:ausente?1:0});
    const row=document.getElementById('nr-'+aId);
    if(row)row.style.background=ausente?'#fff8f8':'';
    const est=document.getElementById('est-'+aId);
    if(est)est.innerHTML=`<span class="bx ${r.estado==='Aprobado'?'bg':r.estado==='Reprobado'?'br':r.estado==='Ausente'?'ba':'bgr'}">${r.estado}</span>`;
    W.loadNotas(asigId);
  }catch(e){console.error(e);}
};
// Alias global para acceso desde onclick en innerHTML
function marcarAusente(aId,asigId,ausente){W.marcarAusente(aId,asigId,ausente);}
function loadAsist(asigId){W.loadAsist(asigId);}

W.updN=async(aId,asigId,campo,val)=>{
  if(!W._nc[aId])W._nc[aId]={};
  W._nc[aId][campo]=val===''?null:parseFloat(val);
  const n=W._nc[aId];
  try{
    const r=await api('PUT',`/api/notas/${aId}/${asigId}`,{
      tp1:n.tp1??'',tp2:n.tp2??'',tp3:n.tp3??'',tp4:n.tp4??'',tp5:n.tp5??'',
      parcial:n.parcial??'',parcial_recuperatorio:n.parcial_recuperatorio??'',
      final_ord:n.final_ord??'',final_recuperatorio:n.final_recuperatorio??'',
      complementario:n.complementario??'',extraordinario:n.extraordinario??''
    });
    const tptot=document.getElementById('tptot-'+aId);
    const tot=document.getElementById('tot-'+aId);
    const nf=document.getElementById('nf-'+aId);
    const est=document.getElementById('est-'+aId);
    if(tptot)tptot.textContent=r.tp_total??'-';
    if(tot)tot.innerHTML=`<span class="prom-tag ${notaCls(r.nota)}">${r.puntaje??'-'}</span>`;
    if(nf)nf.innerHTML=`<span class="nota-tag ${notaCls(r.nota)}">${r.nota??'-'}</span>`;
    if(est)est.innerHTML=`<span class="bx ${r.estado==='Aprobado'?'bg':r.estado==='Reprobado'?'br':r.estado==='Ausente'?'ba':'bgr'}">${r.estado}</span>`;
  }catch(e){console.error(e);}
};

// ── ASISTENCIA ────────────────────────────────────────────────────────────────
async function pgAsist(el){
  const url='/api/asignaciones'+(me.rol==='docente'&&me.docenteId?'?docente_id='+me.docenteId:'');
  const [asigs,horarios]=await Promise.all([api('GET',url),api('GET','/api/horarios')]);
  W._asistAsigs=asigs; W._asistHorarios=horarios;
  const diasN=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const diaHoy=diasN[new Date().getDay()];
  const hoyStr=new Date().toISOString().split('T')[0];
  let asigsFiltradas=asigs;
  if(me.rol==='docente'){
    const asigIdsHoy=new Set(horarios.filter(h=>h.dia===diaHoy&&h.asignacion_id).map(h=>h.asignacion_id));
    asigsFiltradas=asigs.filter(a=>asigIdsHoy.has(a.id));
  }
  // Carreras y años únicos desde asignaciones reales
  const carrsEnAsigs=[...new Map(asigs.filter(a=>a.carrera_id).map(a=>[a.carrera_id,{id:a.carrera_id,nombre:a.carrera_nombre}])).values()].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const aniosEnAsigs=[...new Set(asigs.map(a=>a.curso_anio).filter(Boolean))].sort();

  el.innerHTML=`<div class="ph"><h3>Registro de asistencia</h3>
    ${me.rol==='director'?`<div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="bs o" onclick="mResumenAsist()">📊 Resumen detallado</button>
      <button class="bs o" onclick="mGenAsist()">📅 Generar calendario</button>
      <button class="bs i" onclick="genCal2026()" style="background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9">📅 Calendario 2026</button>
      <button class="bs d" onclick="limpiarCalMayoJul()" style="font-size:11px">🗑 Limpiar May–Jul</button>
    </div>`:''}
  </div>
  ${me.rol==='docente'?`<div style="background:#e8f5e9;border:1px solid #c8e6c9;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px">
    📅 Hoy es <strong>${diaHoy}</strong> — mostrando tus materias de hoy (${asigsFiltradas.length} materia${asigsFiltradas.length!==1?'s':''})
  </div>`:''}
  <div class="fb" style="flex-wrap:wrap;gap:8px;margin-bottom:4px">
    <select id="filtAsistCarr" onchange="filtAsistAsigs()" style="min-width:160px">
      <option value="">Todas las carreras</option>
      ${carrsEnAsigs.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('')}
    </select>
    <select id="filtAsistTurno" onchange="filtAsistAsigs()" style="min-width:130px">
      <option value="">Ambos turnos</option>
      <option value="1">T1 (19:00–20:20)</option>
      <option value="2">T2 (20:40–22:00)</option>
    </select>
    <select id="filtAsistAnio" onchange="filtAsistAsigs()" style="min-width:100px">
      <option value="">Todos los años</option>
      ${aniosEnAsigs.map(a=>`<option value="${a}">${a}° año</option>`).join('')}
    </select>
    <select id="selAsistAsig" onchange="W.loadAsist(this.value)" style="min-width:240px;flex:1">
      <option value="">— Seleccionar materia —</option>
      ${asigsFiltradas.map(a=>{
        const h=horarios.find(x=>x.asignacion_id===a.id);
        const tl=h?` [${h.turno===1?'T1 19:00':'T2 20:40'}]`:'';
        return `<option value="${a.id}">${a.materia_nombre} · ${a.carrera_nombre} ${a.curso_anio}°${a.curso_division==='U'?'':a.curso_division}${tl}</option>`;
      }).join('')}
    </select>
    <input type="date" id="fecAsist" value="${hoyStr}" style="width:auto" onchange="if(W._asistId)W.loadAsist(W._asistId)"/>
  </div>
  <div id="ac"></div>`;
}
function filtAsistAsigs(){
  const carrId=v('filtAsistCarr');
  const turno=v('filtAsistTurno');
  const anio=v('filtAsistAnio');
  const sel=document.getElementById('selAsistAsig');
  if(!sel)return;
  let asigs=W._asistAsigs||[];
  const horarios=W._asistHorarios||[];
  if(carrId) asigs=asigs.filter(a=>a.carrera_id===carrId);
  if(anio)   asigs=asigs.filter(a=>String(a.curso_anio)===anio);
  if(turno){
    const ids=new Set(horarios.filter(h=>String(h.turno)===turno&&h.asignacion_id).map(h=>h.asignacion_id));
    asigs=asigs.filter(a=>ids.has(a.id));
  }
  sel.innerHTML='<option value="">— Seleccionar materia —</option>'+asigs.map(a=>{
    const h=horarios.find(x=>x.asignacion_id===a.id);
    const tl=h?` [${h.turno===1?'T1 19:00':'T2 20:40'}]`:'';
    return `<option value="${a.id}">${a.materia_nombre} · ${a.carrera_nombre} ${a.curso_anio}°${a.curso_division==='U'?'':a.curso_division}${tl}</option>`;
  }).join('');
  const ac=document.getElementById('ac');if(ac)ac.innerHTML='';
}
async function verCalSemestral(){
  const asigs=W._asistAsigs||[];
  const horarios=W._asistHorarios||[];
  const meses=[{n:'Mayo',m:'2026-05'},{n:'Junio',m:'2026-06'},{n:'Julio',m:'2026-07'}];
  const diasSem=['Lunes','Martes','Miércoles','Jueves','Viernes'];
  const colores={'1':'#e3f2fd','2':'#fff3e0'};
  let html=`<h4>📊 Calendario Semestral 2026 — Mayo a Julio</h4>
  <p style="font-size:12px;color:var(--t2);margin-bottom:14px">Vista por mes · Carrera · Materia · Docente · Horario</p>`;
  meses.forEach(({n,m})=>{
    html+=`<div style="margin-bottom:20px"><p style="font-weight:700;font-size:14px;margin-bottom:8px">📅 ${n} 2026</p>`;
    html+=`<table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr style="background:#f0f4f8">
      <th style="padding:6px 8px;border:1px solid var(--bdr);min-width:90px">Turno</th>
      ${diasSem.map(d=>`<th style="padding:6px 8px;border:1px solid var(--bdr);text-align:center">${d}</th>`).join('')}
    </tr></thead><tbody>`;
    [1,2].forEach(turno=>{
      const lbl=turno===1?'T1 19:00–20:20':'T2 20:40–22:00';
      html+=`<tr><td style="border:1px solid var(--bdr);padding:6px 8px;font-weight:700;background:${colores[turno]}">${lbl}</td>`;
      diasSem.forEach(dia=>{
        const hs=horarios.filter(h=>h.dia===dia&&h.turno===turno&&h.asignacion_id);
        const asigsDia=hs.map(h=>asigs.find(a=>a.id===h.asignacion_id)).filter(Boolean);
        if(!asigsDia.length){html+=`<td style="border:1px solid var(--bdr);padding:4px;background:#fafaf8"><span style="color:var(--t3);font-size:10px">—</span></td>`;return;}
        html+=`<td style="border:1px solid var(--bdr);padding:4px;vertical-align:top">`;
        asigsDia.forEach(a=>{
          html+=`<div style="background:${colores[turno]};border-radius:4px;padding:3px 5px;margin-bottom:2px;font-size:10px">
            <div style="font-weight:700">${a.materia_nombre}</div>
            <div style="color:var(--t2)">${a.carrera_nombre} ${a.curso_anio}°</div>
            <div style="color:#555">${a.docente_nombre} ${a.docente_apellido}</div>
          </div>`;
        });
        html+=`</td>`;
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  modal(html+'<div class="mf"><button class="bn" onclick="cm()">Cerrar</button></div>',true);
}
function mGenAsist(){
  modal(`<h4>📅 Generar calendario de asistencia</h4>
  <p style="font-size:13px;color:var(--t2);margin-bottom:12px">Pre-genera los días de clase (Lun–Vie) desde el inicio del período. Los docentes solo marcan P/A/T/J.</p>
  <div class="fg"><div class="fr">
    <div class="f"><label>Fecha de inicio</label><input id="genFecIni" type="date" value="2026-05-01"/></div>
    <div class="f"><label>Fecha de fin</label><input id="genFecFin" type="date" value="${new Date().getFullYear()}-12-20"/></div>
  </div></div>

  <div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="ejecutarGenAsist()">Generar</button></div>`);

async function ejecutarGenAsist(){
  const fi=v('genFecIni'),ff=v('genFecFin');
  if(!fi)return alert('Ingresar fecha de inicio');
  document.getElementById('genMsg').innerHTML='<div class="ir" style="background:#f0f7ff">Generando... puede tomar unos segundos.</div>';
  try{
    const r=await api('POST','/api/asistencia/generar',{fecha_inicio:fi,fecha_fin:ff});
    document.getElementById('genMsg').innerHTML=`<div class="ir ok">✓ ${r.generadas.toLocaleString()} registros pre-generados desde ${fi} hasta ${ff||'fin de año'}</div>`;
  }catch(e){document.getElementById('genMsg').innerHTML=`<div class="ir err">${e.message}</div>`;}
}
async function genCal2026(){
  if(!confirm('¿Generar el calendario de asistencia desde el 01 de mayo hasta el 31 de julio de 2026?\n\nEsto creará registros para todos los alumnos activos según el horario cargado.'))return;
  try{
    const r=await api('POST','/api/asistencia/generar-2026',{});

  }catch(e){alert('Error: '+e.message);}
}

W.loadAsist=async(asigId)=>{
  if(!asigId)return;
  W._asistId=asigId;
  const sel=document.getElementById('selAsistAsig');
  if(sel)sel.value=asigId;
  const fecha=v('fecAsist')||new Date().toISOString().split('T')[0];

  if(me.rol==='docente'){
    const diasN=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const diaFecha=diasN[new Date(fecha+'T12:00:00').getDay()];
    const hor=W._asistHorarios?.find(h=>h.asignacion_id===asigId);
    if(hor&&hor.dia!==diaFecha){
      const ac=document.getElementById('ac');
      if(ac)ac.innerHTML=`<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:14px;margin-top:8px;font-size:13px">
        ⚠ Esta materia se dicta los <strong>${hor.dia}</strong>. Seleccioná una fecha que corresponda a ese día.
      </div>`;
      return;
    }
  }

  const [{alumnos},asist]=await Promise.all([
    api('GET','/api/notas/asignacion/'+asigId),
    api('GET','/api/asistencia/asignacion/'+asigId)
  ]);
  const hoy=asist.filter(a=>a.fecha===fecha);
  const estMap={};

async function grdAsist(){
  if(!W._ast){alert('Cargá una materia primero');return;}

async function generarResumen(){
  const asigId=v('rsAsig'),anio=v('rsAnio'),mes=v('rsMes'),dia=v('rsDia');
  if(!asigId)return alert('Seleccionar una materia');
  try{
    // Si hay día específico, sobreescribir el mes con el mes del día
    let urlAnio=anio,urlMes=mes;
    if(dia){urlAnio=dia.split('-')[0];urlMes=String(parseInt(dia.split('-')[1]));}
    const r=await api('GET',`/api/asistencia/resumen?asignacion_id=${asigId}&anio=${urlAnio}&mes=${urlMes}`);
    let {alumnos,fechas,desde,hasta}=r;
    // Si hay día específico, filtrar solo ese día
    if(dia){fechas=fechas.filter(f=>f===dia);desde=dia;hasta=dia;}
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const estColor={P:'#d4edda',A:'#f8d7da',T:'#fff3cd',J:'#d1ecf1'};
    const diasSem={0:'Dom',1:'Lun',2:'Mar',3:'Mié',4:'Jue',5:'Vie',6:'Sáb'};
    const semanas=[];let sem=[];
    fechas.forEach((f,i)=>{sem.push(f);if(sem.length===5||i===fechas.length-1){semanas.push([...sem]);sem=[];}});
    let html=`<h4>📊 ${dia?'Día: '+fmtFecha(dia):'Resumen — '+meses[parseInt(mes)-1]+' '+anio}</h4>
    <p style="font-size:12px;color:var(--t2);margin-bottom:10px">${desde} → ${hasta} · ${alumnos.length} alumnos</p>`;
    if(!fechas.length){html+='<div class="es">Sin registros para el período seleccionado</div>';cm();modal(html+'<div class="mf"><button class="bn" onclick="cm()">Cerrar</button></div>',true);return;}
    semanas.forEach((sem,si)=>{
      html+=`<p style="font-weight:700;font-size:12px;margin:12px 0 6px">${dia?'Detalle del día':'Semana '+(si+1)}</p>
      <div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:11px;width:100%">
      <thead><tr style="background:#f5f5f5">
        <th style="padding:5px 8px;border:1px solid var(--bdr);text-align:left;min-width:130px">Alumno</th>
        ${sem.map(f=>{const d=new Date(f+'T12:00:00');return`<th style="padding:5px 6px;border:1px solid var(--bdr);text-align:center;white-space:nowrap">${diasSem[d.getDay()]} ${f.slice(5)}</th>`}).join('')}
        <th style="padding:5px 6px;border:1px solid var(--bdr);text-align:center;background:#d4edda">P</th>
        <th style="padding:5px 6px;border:1px solid var(--bdr);text-align:center;background:#f8d7da">A</th>
        <th style="padding:5px 6px;border:1px solid var(--bdr);text-align:center">%</th>
      </tr></thead><tbody>
      ${alumnos.map(al=>{
        const presT=Object.values(al.dias||{}).filter(e=>e==='P').length;
        const ausT=Object.values(al.dias||{}).filter(e=>e==='A').length;
        const tot=Object.values(al.dias||{}).length;
        const pct=tot?Math.round(presT/tot*100):0;
        return`<tr>
          <td style="padding:5px 8px;border:1px solid var(--bdr)"><strong>${al.apellido||''}</strong>, ${al.nombre||''}</td>
          ${sem.map(f=>{const e=al.dias?.[f]||'';return`<td style="border:1px solid var(--bdr);text-align:center;background:${estColor[e]||'#fff'};padding:3px">${e||'—'}</td>`;}).join('')}
          <td style="border:1px solid var(--bdr);text-align:center;background:#d4edda;font-weight:700">${presT}</td>
          <td style="border:1px solid var(--bdr);text-align:center;background:#f8d7da;font-weight:700">${ausT}</td>
          <td style="border:1px solid var(--bdr);text-align:center;color:${pct>=75?'#2e7d32':'#c62828'};font-weight:700">${pct}%</td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
    });
    cm();
    modal(`${html}<div class="mf"><button class="bn" onclick="cm()">Cerrar</button></div>`,true);
  }catch(e){alert('Error: '+e.message);}
}

function autoMontoArancel(){

  const fd=new FormData();fd.append('archivo',file);
  try{
    const r=await api('POST','/api/pagos/importar',fd,true);
    let msg=`✓ ${r.ok} pagos importados`;
    if(r.errores?.length)msg+=`\n⚠ ${r.errores.length} errores: ${r.errores.slice(0,3).join(', ')}`;
    if(r.conflictos?.length){
      // Mostrar conflictos uno a uno
      W._conflictosPago=r.conflictos;
      W._conflictoIdx=0;
      W._conflictosOk=r.ok;
      procesarConflictoPago();
    } else {
      alert(msg);go('pagos');
    }
  }catch(e){alert('Error: '+e.message);}
}
function procesarConflictoPago(){
  const c=W._conflictosPago[W._conflictoIdx];
  if(!c){alert(`✓ Importación completa. ${W._conflictosOk} pagos procesados.`);go('pagos');return;}
  modal(`<h4>⚠ Conflicto de pago detectado</h4>
  <p style="margin-bottom:12px;font-size:13px">Se encontró una coincidencia para:</p>
  <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:12px;margin-bottom:14px">
    <p style="font-weight:700">${c.nombre}</p>
    <p style="font-size:13px;color:var(--t2)">CI: ${c.ci} · Carrera: ${c.carrera}</p>
    <p style="font-size:13px;color:var(--t2)">Concepto: ${c.concepto} · Monto: Gs. ${Number(c.monto).toLocaleString()} · Fecha: ${c.fecha}</p>
  </div>
  <p style="font-size:13px">¿Desea reemplazar los datos actuales de este pago?</p>
  <div class="mf">
    <button class="bs" onclick="saltarConflicto()">Omitir</button>
    <button class="bn" onclick="confirmarReemplazo('${c.pago_id}','${c.concepto}',${c.monto},'${c.fecha}')">Reemplazar</button>
  </div>`);
}
async function confirmarReemplazo(pagoId,concepto,monto,fecha){
  try{
    await api('PUT','/api/pagos/'+pagoId+'/reemplazar',{concepto,monto,fecha_pago:fecha,medio_pago:'Transferencia'});
    W._conflictosOk++;
  }catch(e){console.error(e);}
  cm();
  W._conflictoIdx++;
  procesarConflictoPago();
}
function saltarConflicto(){cm();W._conflictoIdx++;procesarConflictoPago();}

W.mInst=d=>{modal(`<h4>Editar institución</h4><div class="fg">

  <div class="fr"><div class="f"><label>Teléfono</label><input id="it" value="${d.telefono||''}"/></div>
  <div class="f"><label>Email</label><input id="ie" value="${d.email||''}"/></div></div>
  <div class="f"><label>Dirección</label><input id="id2" value="${d.direccion||''}"/></div>
  <div class="f"><label>Misión</label><textarea id="im" rows="3">${d.mision||''}</textarea></div>
</div><div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="svInst()">Guardar</button></div>`);};
async function svInst(){await api('PUT','/api/institucion',{nombre:v('in'),telefono:v('it'),email:v('ie'),direccion:v('id2'),mision:v('im')});cm();go('institucion');}

// ── USUARIOS ──────────────────────────────────────────────────────────────────
async function pgUsuarios(el){
  const data=await api('GET','/api/usuarios/directores');
  el.innerHTML=`<div class="ph"><h3>Usuarios y accesos</h3><button class="bn" onclick="mUsuario()">+ Nuevo usuario</button></div>
  <div class="card"><div class="tw"><table><thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th></th></tr></thead><tbody>
  ${data.map(u=>`<tr>
    <td><strong>${u.nombre} ${u.apellido||''}</strong></td>
    <td style="font-size:12px">${u.email}</td>
    <td><span class="bx bb">${u.rol}</span></td>
    <td><span class="bx ${u.activo?'bg':'br'}">${u.activo?'Activo':'Inactivo'}</span></td>
    <td><div class="abs">
      <button class="bs i" onclick='mUsuario(${JSON.stringify(u).replace(/"/g,"&quot;")})'>Editar</button>
      <button class="bs s" onclick="mPassU('${u.id}')">Clave</button>
      <button class="bs d" onclick="delU('${u.id}')">Eliminar</button>
    </div></td></tr>`).join('')}
  </tbody></table></div></div>`;
}
function mUsuario(u){const e=!!u;modal(`<h4>${e?'Editar':'Nuevo'} usuario</h4><div class="fg">
  <div class="fr"><div class="f"><label>Nombre</label><input id="un2" value="${e?u.nombre:''}" placeholder="Nombre"/></div>
  <div class="f"><label>Apellido</label><input id="uap" value="${e?u.apellido||'':''}" placeholder="Apellido"/></div></div>
  <div class="f"><label>Email</label><input id="uem" value="${e?u.email:''}" placeholder="nombre@its.edu.py"/></div>
  ${!e?`<div class="f"><label>Contraseña</label><input id="ups" type="password" placeholder="Mín. 4 caracteres"/></div>`:''}
  <div class="f"><label>Rol</label><select id="urol"><option value="director" ${e&&u.rol==='director'?'selected':''}>Director — acceso total</option></select></div>
  ${e?`<div class="f"><label>Estado</label><select id="uact"><option value="1" ${u.activo?'selected':''}>Activo</option><option value="0" ${!u.activo?'selected':''}>Inactivo</option></select></div>`:''}
</div><div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="svUsuario('${e?u.id:''}')">Guardar</button></div>`);}
async function svUsuario(id){
  const o={nombre:v('un2'),apellido:v('uap'),email:v('uem'),rol:v('urol')};
  if(!o.nombre||!o.email)return alert('Completar nombre y email');
  if(!id){o.password=v('ups');if(!o.password)return alert('Ingresar contraseña');}
  else o.activo=v('uact')==='1';
  try{id?await api('PUT','/api/usuarios/directores/'+id,o):await api('POST','/api/usuarios/directores',o);cm();go('usuarios');}catch(e){alert(e.message);}
}
function mPassU(id){modal(`<h4>Cambiar contraseña</h4><div class="fg"><div class="f"><label>Nueva contraseña</label><input id="npu" type="password" placeholder="Mín. 4 caracteres"/></div></div>
<div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="svPassU('${id}')">Guardar</button></div>`);}
async function svPassU(id){const p=v('npu');if(p.length<4)return alert('Mín. 4 caracteres');await api('PUT','/api/usuarios/directores/'+id+'/password',{password:p});cm();alert('Contraseña actualizada');}
async function delU(id){if(!confirm('¿Eliminar?'))return;try{await api('DELETE','/api/usuarios/directores/'+id);go('usuarios');}catch(e){alert(e.message);}}

// ── MI PERFIL ─────────────────────────────────────────────────────────────────
async function pgPerfil(el){
  const u=await api('GET','/api/mi-perfil');
  el.innerHTML=`<div class="ph"><h3>Mi perfil</h3></div>
  <div class="card card-p" style="max-width:460px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div><div style="font-size:11px;color:var(--t3)">Nombre</div><div style="font-size:15px;font-weight:600">${u.nombre} ${u.apellido||''}</div></div>
      <div><div style="font-size:11px;color:var(--t3)">Email</div><div style="font-size:13px">${u.email}</div></div>
      <div><div style="font-size:11px;color:var(--t3)">Rol</div><span class="bx bb">${u.rol}</span></div>
    </div>
    <div style="border-top:1px solid var(--bdr);padding-top:16px">
      <p style="font-size:14px;font-weight:600;margin-bottom:12px">Cambiar contraseña</p>
      <div class="fg" style="max-width:320px">
        <div class="f"><label>Contraseña actual</label><input id="pa2" type="password" placeholder="Tu contraseña actual"/></div>
        <div class="f"><label>Nueva contraseña</label><input id="pn2" type="password" placeholder="Mín. 4 caracteres"/></div>
        <div class="f"><label>Confirmar nueva</label><input id="pc2" type="password" placeholder="Repetir"/></div>
        <button class="bn" onclick="svMiPass()">Cambiar contraseña</button>
        <div id="pmsg" style="margin-top:8px;font-size:13px"></div>
      </div>
    </div>
  </div>`;
}
async function svMiPass(){
  const actual=v('pa2'),nueva=v('pn2'),conf=v('pc2');
  const msg=document.getElementById('pmsg');
  if(!actual||!nueva)return msg.innerHTML='<span style="color:var(--red)">Completar todos los campos</span>';
  if(nueva!==conf)return msg.innerHTML='<span style="color:var(--red)">Las contraseñas no coinciden</span>';
  if(nueva.length<4)return msg.innerHTML='<span style="color:var(--red)">Mín. 4 caracteres</span>';
  try{await api('PUT','/api/mi-perfil/password',{actual,nueva});msg.innerHTML='<span style="color:var(--green)">✓ Contraseña cambiada</span>';['pa2','pn2','pc2'].forEach(id=>document.getElementById(id).value='');}
  catch(e){msg.innerHTML=`<span style="color:var(--red)">${e.message}</span>`;}
}
