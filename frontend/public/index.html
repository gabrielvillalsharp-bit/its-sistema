<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ITS — Sistema Académico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--blue:#185FA5;--bl:#E6F1FB;--bld:#0C447C;--green:#27500A;--gl:#EAF3DE;--red:#791F1F;--rl:#FCEBEB;--amb:#633806;--al:#FAEEDA;--pur:#3C3489;--pl:#EEEDFE;--bdr:#e5e4df;--bg:#f8f7f4;--txt:#1a1a18;--t2:#5f5e5a;--t3:#888780}
body{background:var(--bg);color:var(--txt);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:14px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);outline:none}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lc{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:2rem;width:360px}
.ll{text-align:center;margin-bottom:1.5rem}
.lb{width:52px;height:52px;background:var(--blue);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:10px}
.lb svg{width:26px;height:26px;fill:white}
.lc h1{font-size:18px;font-weight:600;margin-bottom:2px}
.lc p{font-size:13px;color:var(--t2)}
.f{margin-bottom:12px}
.f label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px;font-weight:500}
.bp{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.bp:hover{background:var(--bld)}
.dl{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.dl p{font-size:11px;color:var(--t3);margin-bottom:6px}
.db2{display:block;width:100%;text-align:left;padding:7px 10px;border:1px solid var(--bdr);border-radius:8px;background:#fafaf8;color:var(--t2);cursor:pointer;font-size:12px;margin-bottom:4px}
.db2:hover{background:#f1f0ec}
#le{font-size:12px;color:#b91c1c;margin-top:6px;display:none}
#ap{display:flex;flex-direction:column;min-height:100vh}
.tb{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:#fff;border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:30}
.tl{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.tl svg{width:16px;height:16px;fill:white}
.tb h2{font-size:15px;font-weight:600}
.tr2{margin-left:auto;display:flex;align-items:center;gap:8px}
.rp{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.rp-director,.rp-admin,.rp-secretaria{background:var(--bl);color:var(--bld)}
.rp-docente{background:var(--gl);color:var(--green)}
.rp-alumno{background:var(--al);color:var(--amb)}
.xb{font-size:12px;padding:5px 10px;border:1px solid var(--bdr);border-radius:8px;background:none;color:var(--t2);cursor:pointer}
.xb:hover{background:#f1f0ec}
.ly{display:flex;flex:1}
.sb{width:200px;flex-shrink:0;background:#fff;border-right:1px solid var(--bdr);padding:12px 8px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.ng{font-size:10px;font-weight:700;color:var(--t3);padding:8px 8px 4px;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--t2);border:none;background:none;width:100%;text-align:left;margin-bottom:1px}
.ni:hover{background:#f1f0ec}
.ni.active{background:var(--bl);color:var(--bld);font-weight:600}
.nd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ct{flex:1;padding:20px;min-width:0;overflow-x:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px;flex-wrap:wrap}
.ph h3{font-size:17px;font-weight:600}
.ph-right{display:flex;gap:8px;flex-wrap:wrap}
.bn{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.bn:hover{background:var(--bld)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.sc{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:12px 14px}
.sc .sl{font-size:11px;color:var(--t3);margin-bottom:2px}
.sc .sv{font-size:26px;font-weight:700}
.sc .ss{font-size:11px;color:var(--t2);margin-top:1px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;background:#fafaf8;color:var(--t2);font-weight:600;font-size:12px;border-bottom:1px solid var(--bdr)}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);color:var(--txt);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.bx{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.bg{background:var(--gl);color:var(--green)}
.br{background:var(--rl);color:var(--red)}
.bb{background:var(--bl);color:var(--bld)}
.ba{background:var(--al);color:var(--amb)}
.bp2{background:var(--pl);color:var(--pur)}
.bgr{background:#f1f0ec;color:#5f5e5a}
.abs{display:flex;gap:4px;flex-wrap:wrap}
.bs{padding:4px 10px;font-size:12px;border:1px solid var(--bdr);border-radius:6px;background:#fff;color:var(--txt);cursor:pointer;white-space:nowrap}
.bs:hover{background:#f1f0ec}
.bs.d{color:#b91c1c;border-color:#fca5a5}.bs.d:hover{background:var(--rl)}
.bs.i{color:var(--bld);border-color:#93c5fd}.bs.i:hover{background:var(--bl)}
.bs.s{color:var(--green);border-color:#86efac}.bs.s:hover{background:var(--gl)}
.es{text-align:center;padding:40px;color:var(--t3);font-size:14px}
.fb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb select{padding:7px 10px;font-size:13px;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);width:auto}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
.modal{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:1.5rem;width:100%;max-width:520px}
.modal h4{font-size:16px;font-weight:600;margin-bottom:1.2rem}
.fg{display:grid;gap:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--bdr)}
.nota-inp{width:58px!important;padding:5px 4px!important;text-align:center;border:1px solid var(--bdr);border-radius:6px;font-size:13px}
.nota-inp:focus{border-color:var(--blue)}
.nota-inp:disabled{background:#f5f5f3;color:var(--t3);cursor:not-allowed}
.nota-lbl{font-size:10px;color:var(--t3);text-align:center;display:block;margin-top:2px}
.nota-col{text-align:center}
.prom-tag{display:inline-flex;align-items:center;justify-content:center;min-width:36px;padding:4px 8px;border-radius:8px;font-size:14px;font-weight:700}
.nota-tag{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:4px 10px;border-radius:20px;font-size:15px;font-weight:800}
.n5{background:#EAF3DE;color:#27500A}
.n4{background:#E6F1FB;color:#0C447C}
.n3{background:#EEEDFE;color:#3C3489}
.n2{background:#FAEEDA;color:#633806}
.n1{background:#FCEBEB;color:#791F1F}
.n-{background:#f1f0ec;color:#888}
.asopt{padding:7px 14px;border:1px solid var(--bdr);border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;background:#fff;color:var(--t2)}
.asopt.P{background:var(--gl);color:var(--green);border-color:#86efac}
.asopt.A{background:var(--rl);color:var(--red);border-color:#fca5a5}
.asopt.T{background:var(--al);color:var(--amb);border-color:#fcd34d}
.asopt.J{background:var(--bl);color:var(--bld);border-color:#93c5fd}
.cur-tag{display:inline-flex;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--pl);color:var(--pur);font-weight:600}
.tip{font-size:12px;color:var(--t3);margin-top:4px}
.peso-box{background:#fafaf8;border:1px solid var(--bdr);border-radius:8px;padding:10px;font-size:12px}
.peso-box .titulo{font-weight:600;font-size:13px;margin-bottom:6px}
.iz{border:2px dashed var(--bdr);border-radius:10px;padding:24px;text-align:center;cursor:pointer;color:var(--t2);font-size:13px}
.iz:hover{border-color:var(--blue);color:var(--blue);background:var(--bl)}
.ir{margin-top:10px;padding:10px;border-radius:8px;font-size:13px}
.ir.ok{background:var(--gl);color:var(--green)}
.ir.err{background:var(--rl);color:var(--red)}
.escala-row{display:grid;grid-template-columns:60px 80px 80px 1fr;gap:8px;align-items:center;margin-bottom:8px}
.escala-row label{font-size:12px;color:var(--t2)}
.info-nota{background:#fafaf8;border-radius:8px;padding:10px;margin-bottom:8px;font-size:13px}
.rec-indicator{font-size:10px;color:var(--amb);font-weight:600;display:block}
</style>
</head>
<body>

<div id="lp">
<div class="lc">
  <div class="ll">
    <div class="lb"><svg viewBox="0 0 24 24"><path d="M12 3L2 8v8l10 5 10-5V8L12 3zm0 2.18L20 9v.09L12 13.09 4 9.09V9l8-3.82zM4 11.28l8 4 8-4V17l-8 4-8-4v-5.72z"/></svg></div>
    <h1>Instituto Técnico Superior</h1>
    <p>Sistema de Gestión Académica</p>
  </div>
  <div class="f"><label>Email o C.I.</label><input id="lem" placeholder="director@its.edu.py"/></div>
  <div class="f"><label>Contraseña</label><input id="lps" type="password" placeholder="••••••"/></div>
  <button class="bp" onclick="doLogin()">Ingresar al sistema</button>
  <div id="le">Email/CI o contraseña incorrectos</div>
  <div class="dl">
    <p>Accesos de demostración:</p>
    <button class="db2" onclick="ql('director@its.edu.py','director123')">Director — acceso total</button>
    <button class="db2" onclick="ql('admin@its.edu.py','admin123')">Administrativo — gestión y carga</button>
  </div>
</div>
</div>

<div id="ap" class="hidden">
<div class="tb">
  <div class="tl"><svg viewBox="0 0 24 24"><path d="M12 3L2 8v8l10 5 10-5V8L12 3zm0 2.18L20 9v.09L12 13.09 4 9.09V9l8-3.82zM4 11.28l8 4 8-4V17l-8 4-8-4v-5.72z"/></svg></div>
  <h2>ITS — Sistema Académico</h2>
  <div class="tr2">
    <span id="un" style="font-size:13px;color:var(--t2)"></span>
    <span id="rp" class="rp"></span>
    <button class="xb" onclick="logout()">Salir</button>
  </div>
</div>
<div class="ly">
  <nav class="sb" id="nav"></nav>
  <div class="ct" id="mc"></div>
</div>
</div>
<div id="mr"></div>

<script>
const API='';let tok=localStorage.getItem('its_tk3');let me=null;const W=window;

async function api(m,u,b,isFile){
  const o={method:m,headers:{}};
  if(tok)o.headers.Authorization='Bearer '+tok;
  if(b&&!isFile){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b);}
  else if(b)o.body=b;
  const r=await fetch(API+u,o);
  if(!r.ok){const e=await r.json().catch(()=>({error:'Error'}));throw new Error(e.error||'Error');}
  return r.json();
}

async function doLogin(){
  document.getElementById('le').style.display='none';
  try{
    const res=await api('POST','/api/login',{email:v('lem'),password:v('lps')});
    tok=res.token;me=res.user;localStorage.setItem('its_tk3',tok);startApp();
  }catch{document.getElementById('le').style.display='block';}
}
function ql(e,p){document.getElementById('lem').value=e;document.getElementById('lps').value=p;}
function logout(){tok=null;me=null;localStorage.removeItem('its_tk3');show('lp');hide('ap');}

function startApp(){
  hide('lp');show('ap');
  document.getElementById('un').textContent=me.nombre+' '+me.apellido;
  const rp=document.getElementById('rp');rp.textContent=me.rol;rp.className='rp rp-'+me.rol;
  buildNav();go('dashboard');
}

function navFor(r){
  return [
    {g:'General',i:[{id:'dashboard',l:'Dashboard',c:'#185FA5',r:['director','admin','secretaria','docente','alumno']}]},
    {g:'Estructura',i:[
      {id:'carreras',l:'Carreras',c:'#7F77DD',r:['director','admin','secretaria']},
      {id:'cursos',l:'Cursos / Grupos',c:'#D85A30',r:['director','admin','secretaria']},
      {id:'materias',l:'Materias',c:'#BA7517',r:['director','admin','secretaria']},
      {id:'periodos',l:'Períodos',c:'#1D9E75',r:['director','admin','secretaria']},
    ]},
    {g:'Personas',i:[
      {id:'docentes',l:'Docentes',c:'#BA7517',r:['director','admin','secretaria']},
      {id:'alumnos',l:'Alumnos',c:'#E24B4A',r:['director','admin','secretaria']},
      {id:'asignaciones',l:'Asignaciones',c:'#888780',r:['director','admin','secretaria']},
    ]},
    {g:'Académico',i:[
      {id:'notas',l:'Notas',c:'#185FA5',r:['director','admin','docente']},
      {id:'asistencia',l:'Asistencia',c:'#1D9E75',r:['director','admin','docente']},
      {id:'pagos',l:'Pagos',c:'#7F77DD',r:['director','admin','secretaria']},
    ]},
    {g:'Mi área',i:[
      {id:'mis-materias',l:'Mis materias',c:'#185FA5',r:['docente']},
      {id:'mis-notas',l:'Mis notas',c:'#185FA5',r:['alumno']},
    ]},
    {g:'Mi área',i:[
      {id:'perfil',l:'Mi perfil / Contraseña',c:'#1D9E75',r:['director','admin','secretaria','docente','alumno']},
    ]},
    {g:'Configuración',i:[
      {id:'usuarios',l:'Usuarios y accesos',c:'#7F77DD',r:['director']},
      {id:'escala',l:'Escala de notas',c:'#D85A30',r:['director','admin']},
      {id:'institucion',l:'Institución',c:'#888780',r:['director','admin']},
    ]},
  ].map(g=>({...g,i:g.i.filter(x=>x.r.includes(r))})).filter(g=>g.i.length);
}
function buildNav(){
  document.getElementById('nav').innerHTML=navFor(me.rol).map(g=>`
    <div class="ng">${g.g}</div>
    ${g.i.map(i=>`<button class="ni" id="ni-${i.id}" onclick="go('${i.id}')"><span class="nd" style="background:${i.c}"></span>${i.l}</button>`).join('')}
  `).join('');
}

let cur='';
function go(p){
  cur=p;
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  document.getElementById('ni-'+p)?.classList.add('active');
  const el=document.getElementById('mc');
  el.innerHTML='<div class="es">Cargando...</div>';
  ({dashboard:pgDash,carreras:pgCarreras,cursos:pgCursos,materias:pgMaterias,periodos:pgPeriodos,
    docentes:pgDocentes,alumnos:pgAlumnos,asignaciones:pgAsig,
    notas:pgNotas,asistencia:pgAsist,pagos:pgPagos,
    escala:pgEscala,institucion:pgInst,usuarios:pgUsuarios,perfil:pgPerfil,
    'mis-materias':pgMisMat,'mis-notas':pgMisNotas})[p]?.(el);
}

// DASHBOARD
async function pgDash(el){
  const d=await api('GET','/api/dashboard');
  el.innerHTML=`<div class="ph"><h3>Dashboard — ${d.periodo_activo}</h3></div>
  <div class="sr">
    <div class="sc"><div class="sl">Alumnos</div><div class="sv">${d.total_alumnos}</div></div>
    <div class="sc"><div class="sl">Docentes</div><div class="sv">${d.total_docentes}</div></div>
    <div class="sc"><div class="sl">Carreras</div><div class="sv">${d.total_carreras}</div></div>
    <div class="sc"><div class="sl">Cursos</div><div class="sv">${d.total_cursos}</div></div>
    <div class="sc"><div class="sl">Aprobados</div><div class="sv" style="color:var(--green)">${d.aprobados}</div></div>
    <div class="sc"><div class="sl">Reprobados</div><div class="sv" style="color:var(--red)">${d.reprobados}</div></div>
  </div>
  <div class="ph"><h3>Alumnos por carrera</h3></div>
  <div class="card"><div class="tw"><table><thead><tr><th>Carrera</th><th>Alumnos</th></tr></thead><tbody>
  ${d.por_carrera.map(c=>`<tr><td>${c.nombre}</td><td><span class="bx bb">${c.total}</span></td></tr>`).join('')}
  </tbody></table></div></div>`;
}

// ESCALA DE NOTAS
async function pgEscala(el){
  const escala=await api('GET','/api/escala');
  W._escala=escala;
  el.innerHTML=`<div class="ph"><h3>Escala de calificaciones</h3><button class="bn" onclick="svEscala()">Guardar cambios</button></div>
  <div class="card" style="padding:16px">
    <p style="font-size:13px;color:var(--t2);margin-bottom:14px">Configurá los rangos de puntaje que corresponden a cada nota. Los cambios se aplican a todos los cálculos futuros.</p>
    <div style="display:grid;grid-template-columns:70px 100px 100px 1fr 80px;gap:8px;margin-bottom:8px">
      <span style="font-size:12px;font-weight:600;color:var(--t3)">Nota</span>
      <span style="font-size:12px;font-weight:600;color:var(--t3)">Pts. mínimo</span>
      <span style="font-size:12px;font-weight:600;color:var(--t3)">Pts. máximo</span>
      <span style="font-size:12px;font-weight:600;color:var(--t3)">Descripción</span>
      <span style="font-size:12px;font-weight:600;color:var(--t3)">Vista previa</span>
    </div>
    ${escala.map(e=>`
    <div style="display:grid;grid-template-columns:70px 100px 100px 1fr 80px;gap:8px;margin-bottom:8px;align-items:center">
      <input type="number" min="1" max="10" value="${e.nota}" id="en-${e.id}" style="text-align:center;font-weight:700"/>
      <input type="number" min="0" max="100" value="${e.puntaje_min}" id="emin-${e.id}"/>
      <input type="number" min="0" max="100" value="${e.puntaje_max}" id="emax-${e.id}"/>
      <input type="text" value="${e.descripcion||''}" id="edesc-${e.id}" placeholder="Ej: Bueno"/>
      <span class="nota-tag n${e.nota}" style="justify-content:center">${e.nota}</span>
    </div>`).join('')}
    <p class="tip" style="margin-top:8px">Los puntajes deben ser continuos de 0 a 100. El mínimo aprobatorio es la nota 2 (actualmente desde ${escala.find(e=>e.nota===2)?.puntaje_min||70} puntos).</p>
  </div>`;
}
async function svEscala(){
  const escala=W._escala.map(e=>({id:e.id,nota:parseInt(v('en-'+e.id)),puntaje_min:parseInt(v('emin-'+e.id)),puntaje_max:parseInt(v('emax-'+e.id)),descripcion:v('edesc-'+e.id)}));
  await api('PUT','/api/escala',{escala});
  alert('Escala guardada correctamente');go('escala');
}

// CARRERAS
async function pgCarreras(el){
  const d=await api('GET','/api/carreras');
  el.innerHTML=`<div class="ph"><h3>Carreras (${d.length})</h3><button class="bn" onclick="mCarrera()">+ Nueva carrera</button></div>
  <div class="card"><div class="tw"><table><thead><tr><th>Código</th><th>Nombre</th><th>Turno</th><th>Alumnos</th><th>Mat.</th><th>Cursos</th><th>Est.</th><th></th></tr></thead><tbody>
  ${d.map(c=>`<tr>
    <td><span class="bx bb">${c.codigo}</span></td><td><strong>${c.nombre}</strong></td><td>${c.turno||'-'}</td>
    <td>${c.total_alumnos}</td><td>${c.total_materias}</td>
    <td>${c.cursos.map(cu=>`<span class="cur-tag">${cu.anio}°${cu.division==='U'?'':cu.division}</span>`).join(' ')}</td>
    <td><span class="bx ${c.activa?'bg':'br'}">${c.activa?'Activa':'Inactiva'}</span></td>
    <td><div class="abs"><button class="bs i" onclick="mCarrera(DJ(this.dataset.j))" data-j="${J(c)}">Editar</button><button class="bs d" onclick="del('${c.id}','carreras')">Eliminar</button></div></td></tr>`).join('')}
  </tbody></table></div></div>`;
}
function mCarrera(c){
  const e=!!c;
  modal(`<h4>${e?'Editar':'Nueva'} carrera</h4>
  <div class="fg">
    <div class="fr"><div class="f"><label>Nombre</label><input id="cn" value="${e?c.nombre:''}" placeholder="Ej: Enfermería"/></div>
    <div class="f"><label>Código</label><input id="cc" value="${e?c.codigo:''}" placeholder="Ej: ENF"/></div></div>

      <th class="nota-col">Parcial<br><span class="tip">/${pesos.parcial}pts</span></th>
      <th class="nota-col">Recup.<br><span class="tip" style="color:var(--amb)">reemplaza</span></th>
      <th class="nota-col">Final<br><span class="tip">/${pesos.final}pts</span></th>
      <th class="nota-col">F.Extr.<br><span class="tip" style="color:var(--amb)">reemplaza</span></th>
      <th class="nota-col">Total<br><span class="tip">/100</span></th>
      <th class="nota-col">Nota<br><span class="tip">1-5</span></th>
      <th>Estado</th>
    </tr>
  </thead><tbody>
  ${alumnos.map(a=>`<tr id="nr-${a.id}">
    <td style="white-space:nowrap"><strong>${a.alumno_apellido||''}</strong>, ${a.alumno_nombre||''}<br><span style="font-size:11px;color:var(--t3)">${a.alumno_ci||''}</span></td>
    <td class="nota-col"><input class="nota-inp" type="number" min="0" max="${pesos.tp}" step="0.5" value="${a.tp??''}" placeholder="—" onchange="updN('${a.id}','${asigId}','tp',this.value)"/></td>
    <td class="nota-col"><input class="nota-inp" type="number" min="0" max="${pesos.parcial}" step="0.5" value="${a.parcial??''}" placeholder="—" onchange="updN('${a.id}','${asigId}','parcial',this.value)"/></td>
    <td class="nota-col" style="background:#fffbf5">
      <input class="nota-inp" type="number" min="0" max="${pesos.parcial}" step="0.5" value="${a.parcial_recuperatorio??''}" placeholder="—" onchange="updN('${a.id}','${asigId}','parcial_recuperatorio',this.value)"/>
      ${a.parcial_recuperatorio!=null?`<span class="rec-indicator">reemplaza P</span>`:''}
    </td>
    <td class="nota-col"><input class="nota-inp" type="number" min="0" max="${pesos.final}" step="0.5" value="${a.final??''}" placeholder="—" onchange="updN('${a.id}','${asigId}','final',this.value)"/></td>
    <td class="nota-col" style="background:#fffbf5">
      <input class="nota-inp" type="number" min="0" max="${pesos.final}" step="0.5" value="${a.final_extraordinario??''}" placeholder="—" onchange="updN('${a.id}','${asigId}','final_extraordinario',this.value)"/>
      ${a.final_extraordinario!=null?`<span class="rec-indicator">reemplaza F</span>`:''}
    </td>
    <td class="nota-col" id="tot-${a.id}"><span class="prom-tag ${notaCls(a.nota_final)}">${a.puntaje_total??'-'}</span></td>
    <td class="nota-col" id="nf-${a.id}"><span class="nota-tag ${notaCls(a.nota_final)}">${a.nota_final??'-'}</span></td>
    <td id="est-${a.id}"><span class="bx ${a.nota_estado==='Aprobado'?'bg':a.nota_estado==='Reprobado'?'br':'bgr'}">${a.nota_estado||'Pendiente'}</span></td>
  </tr>`).join('')}
  </tbody></table></div></div>

function notaCls(n){return n?`n${n}`:'n-';}

W.updN=async(aid,asigId,field,val)=>{
  if(!W._nc)W._nc={};
  if(!W._nc[aid])W._nc[aid]={};
  W._nc[aid][field]=val===''?null:val;
  try{
    const r=await api('PUT',`/api/notas/${aid}/${asigId}`,W._nc[aid]);
    const cls=r.estado==='Aprobado'?'bg':r.estado==='Reprobado'?'br':'bgr';
    const notaCls2=r.nota?`n${r.nota}`:'n-';
    document.getElementById('tot-'+aid).innerHTML=`<span class="prom-tag ${notaCls2}">${r.puntaje??'-'}</span>`;
    document.getElementById('nf-'+aid).innerHTML=`<span class="nota-tag ${notaCls2}">${r.nota??'-'}</span>`;
    document.getElementById('est-'+aid).innerHTML=`<span class="bx ${cls}">${r.estado}</span>`;
  }catch(e){console.error('Error guardando nota:',e);}
};

async function pgAsist(el){

W.loadAsist=async(asigId)=>{
  if(!asigId)return;
  const fecha=document.getElementById('afecha')?.value||new Date().toISOString().split('T')[0];
  const [data,regs]=await Promise.all([api('GET','/api/notas/asignacion/'+asigId),api('GET','/api/asistencia/asignacion/'+asigId)]);
  const map={};regs.filter(r=>r.fecha===fecha).forEach(r=>map[r.alumno_id]=r.estado);
  W._ast={asigId,fecha,est:{...map}};
  const nc=document.getElementById('acon');
  if(!data.alumnos.length){nc.innerHTML='<div class="es">Sin alumnos</div>';return;}
  nc.innerHTML=`<div class="card" style="padding:16px">
    <p style="font-size:13px;color:var(--t2);margin-bottom:14px">Clase del <strong>${fecha}</strong></p>
    ${data.alumnos.map(a=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr)">
      <div><span style="font-size:13px;font-weight:500">${a.alumno_apellido||''}, ${a.alumno_nombre||''}</span>
        <span style="font-size:11px;color:var(--t3);margin-left:6px">${a.alumno_ci||''}</span></div>
      <div style="display:flex;gap:4px">
        ${['P','A','T','J'].map(s=>`<button class="asopt ${W._ast.est[a.id]===s?s:''}" id="ao-${a.id}-${s}" onclick="sA('${a.id}','${s}')">${s}</button>`).join('')}
      </div>
    </div>`).join('')}
  </div>
  <button class="bn" style="margin-top:12px" onclick="grdAsist()">Guardar asistencia del día</button>
  <div id="amsg"></div>`;
};

W.sA=(aid,est)=>{
  if(!W._ast)return;
  W._ast.est[aid]=est;
  ['P','A','T','J'].forEach(s=>{const b=document.getElementById(`ao-${aid}-${s}`);if(b)b.className='asopt'+(est===s?' '+s:'');});
};
W.grdAsist=async()=>{
  const {asigId,fecha,est}=W._ast;
  const registros=Object.entries(est).map(([alumno_id,estado])=>({alumno_id,estado}));
  if(!registros.length)return alert('Sin registros para guardar');
  await api('POST','/api/asistencia/bulk',{asignacion_id:asigId,fecha,registros});
  document.getElementById('amsg').innerHTML='<span class="bx bg" style="margin-top:8px;display:inline-block">✓ Asistencia guardada</span>';
  setTimeout(()=>{const m=document.getElementById('amsg');if(m)m.innerHTML='';},3000);
};

    id?await api('PUT','/api/usuarios/directores/'+id,o):await api('POST','/api/usuarios/directores',o);

// GESTIÓN DE USUARIOS
const ROLES=[
  {v:'director',l:'Director — acceso total'},
  {v:'docente',l:'Docente — solo sus materias'},
  {v:'alumno',l:'Alumno — solo sus notas'},
];
function rBadge(r){return r==='director'?'bb':r==='docente'?'bg':'ba';}
function rLabel(r){return ROLES.find(x=>x.v===r)?.l.split('—')[0].trim()||r;}

async function pgUsuarios(el){
  const data=await api('GET','/api/usuarios');
  W._ustore={};
  data.forEach(u=>{W._ustore[u.id]=u;});
  el.innerHTML=`<div class="ph"><h3>Usuarios y accesos (${data.length})</h3><button class="bn" onclick="mUsuario(null)">+ Nuevo usuario</button></div>
  <p class="tip" style="margin-bottom:14px">Creá y gestioná el acceso de todas las personas al sistema.</p>
  <div class="card"><div class="tw"><table><thead><tr><th>Nombre</th><th>Email</th><th>C.I.</th><th>Rol</th><th>Estado</th><th></th></tr></thead><tbody>
  ${data.map(u=>`<tr>
    <td><strong>${u.nombre} ${u.apellido||''}</strong></td>
    <td style="font-size:12px">${u.email||'-'}</td>
    <td style="font-size:12px">${u.ci||'-'}</td>
    <td><span class="bx ${rBadge(u.rol)}">${rLabel(u.rol)}</span></td>
    <td><span class="bx ${u.activo?'bg':'br'}">${u.activo?'Activo':'Inactivo'}</span></td>
    <td><div class="abs">
      <button class="bs i" onclick="mUsuario(W._ustore['${u.id}'])">Editar</button>
      <button class="bs s" onclick="mPassU('${u.id}')">Clave</button>
      <button class="bs" onclick="toggleU('${u.id}')">${u.activo?'Desactivar':'Activar'}</button>
      <button class="bs d" onclick="delU('${u.id}')">Eliminar</button>
    </div></td></tr>`).join('')}
  </tbody></table></div></div>`;
}
function mUsuario(u){
  const e=!!u;
  modal(`<h4>${e?'Editar usuario':'Nuevo usuario'}</h4>
  <div class="fg">
    <div class="fr">
      <div class="f"><label>Nombre</label><input id="un2" value="${e?u.nombre:''}" placeholder="Nombre"/></div>
      <div class="f"><label>Apellido</label><input id="uap" value="${e?u.apellido||'':''}" placeholder="Apellido"/></div>
    </div>
    <div class="fr">
      <div class="f"><label>C.I.</label><input id="uci2" value="${e?u.ci||'':''}" placeholder="0.000.000"/></div>
      <div class="f"><label>Rol</label><select id="urol">
        ${ROLES.map(r=>`<option value="${r.v}" ${e&&u.rol===r.v?'selected':''}>${r.l}</option>`).join('')}
      </select></div>
    </div>
    <div class="f"><label>Email (para ingresar al sistema)</label><input id="uem" value="${e?u.email||'':''}" placeholder="nombre@gmail.com"/></div>
    ${!e?`<div class="f"><label>Contraseña inicial</label><input id="ups" type="password" placeholder="Mín. 6 caracteres"/></div>`:''}
    ${e?`<div class="f"><label>Estado</label><select id="uact"><option value="1" ${u.activo?'selected':''}>Activo</option><option value="0" ${!u.activo?'selected':''}>Inactivo</option></select></div>`:''}
  </div>
  <div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="svUsuario('${e?u.id:''}')">Guardar</button></div>`);
}
async function svUsuario(id){
  const o={nombre:v('un2'),apellido:v('uap'),ci:v('uci2')||null,email:v('uem'),rol:v('urol')};
  if(!o.nombre||!o.apellido)return alert('Completar nombre y apellido');
  if(!o.email)return alert('El email es obligatorio');
  if(!id){o.password=v('ups');if(!o.password||o.password.length<6)return alert('Contraseña mínimo 6 caracteres');}
  else o.activo=v('uact')==='1';
  try{id?await api('PUT','/api/usuarios/'+id,o):await api('POST','/api/usuarios',o);cm();go('usuarios');}
  catch(e){alert(e.message);}
}

  modal(`<h4>Cambiar contraseña</h4>
  <div class="fg">
    <div class="f"><label>Nueva contraseña</label><input id="npu" type="password" placeholder="Mín. 6 caracteres"/></div>
    <div class="f"><label>Confirmar</label><input id="npu2" type="password" placeholder="Repetir"/></div>
  </div>
  <div class="mf"><button class="bs" onclick="cm()">Cancelar</button><button class="bn" onclick="svPassU('${id}')">Guardar</button></div>`);
}

  await api('PUT','/api/usuarios/'+id+'/password',{password:p});
  cm();alert('Contraseña actualizada');
}

  if(!confirm('¿Eliminar este usuario?'))return;

}
